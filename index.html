<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="apple-touch-icon" href="icon2.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Log">
  <title>Workout Log</title>
  <style>
    :root {
      --bg:      #0f0f0f;
      --card:    #1c1c1e;
      --card2:   #2c2c2e;
      --accent:  #ff6b00;
      --green:   #30d158;
      --red:     #ff453a;
      --text:    #ffffff;
      --dim:     #8e8e93;
      --border:  #3a3a3c;
      --radius:  12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      min-height: 100vh;
      padding-bottom: 90px;
      overscroll-behavior: none;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--card);
      padding: 12px 16px 8px;
      padding-top: calc(12px + env(safe-area-inset-top));
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* ── WEEK TABS ── */
    .week-tabs-wrapper { margin-bottom: 12px; }
    .week-tabs-month {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--dim);
      width: calc((100% - 36px) / 7);
      text-align: center;
      margin-bottom: 3px;
    }
    .week-tabs {
      display: flex;
      gap: 6px;
    }

    .day-tab {
      flex: 1;
      padding: 4px 4px;
      border: none;
      border-radius: 8px;
      background: var(--card2);
      color: var(--dim);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-height: 44px;
      justify-content: center;
    }

    .day-tab .day-letter { font-size: 14px; font-weight: 800; }
    .day-tab .day-num   { font-size: 11px; }
    .day-tab .day-dot   { width: 5px; height: 5px; border-radius: 50%; background: transparent; }

    .day-tab.active          { background: var(--accent); color: #fff; }
    .day-tab.has-progress .day-dot { background: var(--green); }
    .day-tab.active .day-dot { background: rgba(255,255,255,0.5); }
    .day-tab.weekend         { background: #1a1a1a; color: #555; border: 1px solid #2a2a2a; }
    .day-tab.weekend.active  { background: var(--accent); color: #fff; border-color: transparent; }
    .day-tab.weekend.has-progress .day-dot { background: var(--green); }

    /* ── WORKOUT META ── */
    .workout-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 32px;
    }

    .workout-type  { font-size: 17px; font-weight: 800; letter-spacing: 0.3px; }
    .workout-days  { font-size: 11px; color: var(--dim); font-weight: 600; letter-spacing: 1px; }

    .expand-btns { display: flex; gap: 6px; margin-top: 6px; }
    .expand-btn {
      flex: 1;
      padding: 4px;
      border: none;
      border-radius: 8px;
      background: var(--card2);
      color: var(--dim);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .expand-btn:active { background: var(--border); }

    .workout-progress { text-align: right; }
    .progress-label   { font-size: 13px; color: var(--dim); }
    .progress-label strong { color: var(--green); }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 5px;
      width: 80px;
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ── SECTIONS ── */
    .section { margin: 6px 12px 0; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--card2);
      border-radius: var(--radius);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: border-radius 0.1s;
    }

    .section-header.open { border-radius: var(--radius) var(--radius) 0 0; }

    .section-left  { display: flex; align-items: center; gap: 10px; }
    .section-icon  { font-size: 18px; }
    .section-name  { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; }
    .section-right { display: flex; align-items: center; gap: 10px; }

    .section-count              { font-size: 13px; color: var(--dim); font-weight: 600; }
    .section-count.has-progress { color: var(--green); }
    .section-count.complete     { color: var(--green); }

    .chevron      { color: var(--dim); font-size: 13px; transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    /* right-arm note */
    .tnote {
      margin: 0 0 12px 0;
      border-radius: 12px;
      background: var(--card);
      overflow: hidden;
      border: 1px solid var(--card2);
    }
    .tnote-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 12px; font-size: 12px; font-weight: 700;
      color: var(--dim); cursor: pointer;
    }
    .tnote-chevron { font-size: 12px; }
    .tnote-body {
      padding: 0 16px 14px;
      font-size: 13px; color: var(--text); line-height: 1.6;
    }
    .tnote-body p { margin: 0 0 8px; }
    .tnote-body p:last-child { margin-bottom: 0; }

    .section-note {
      background: rgba(48,209,88,0.08);
      border: 1px solid rgba(48,209,88,0.2);
      border-top: none;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
    }

    /* section body */
    .section-body {
      background: var(--card);
      border-radius: 0 0 var(--radius) var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      border-top: none;
    }

    .group-label {
      padding: 10px 14px 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--dim);
      text-transform: uppercase;
      border-top: 1px solid var(--border);
    }

    .group-label:first-child { border-top: none; }

    /* ── EXERCISE ROW ── */
    .exercise-item {
      display: flex;
      align-items: center;
      padding: 9px 14px;
      gap: 10px;
      min-height: 40px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .exercise-item:active { background: rgba(255,255,255,0.05); }

    .exercise-item.checked .exercise-label {
      color: var(--dim);
      text-decoration: line-through;
    }

    .checkbox {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .exercise-item.checked .checkbox {
      background: var(--green);
      border-color: var(--green);
    }

    .checkmark { display: none; color: #fff; font-size: 14px; font-weight: 700; }
    .exercise-item.checked .checkmark { display: block; }

    .exercise-label { font-size: 15px; flex: 1; line-height: 1.3; }
    .timed-icon { font-size: 11px; color: var(--dim); flex-shrink: 0; margin-left: 4px; opacity: 0.6; }
    .video-link-btn { background: none; border: none; font-size: 15px; cursor: pointer; padding: 0 2px; flex-shrink: 0; opacity: 0.8; line-height: 1; }

    /* ── WORKOUT BUILDER ── */
    .builder-modal { max-width: 480px; width: 96vw; max-height: 88vh; display: flex; flex-direction: column; padding: 0; border-radius: 16px; overflow: hidden; }
    .builder-header { padding: 16px 16px 0; flex-shrink: 0; }
    .builder-header h3 { margin: 0 0 12px; font-size: 17px; }
    .builder-day-tabs { display: flex; gap: 5px; margin-bottom: 12px; }
    .builder-day-tab { flex: 1; padding: 7px 4px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--dim); font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; }
    .builder-day-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(255,107,0,0.1); }
    .builder-body { flex: 1; overflow-y: auto; padding: 0 16px 8px; }
    .builder-section { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
    .builder-sec-header { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); cursor: pointer; }
    .builder-sec-header:active { opacity: 0.7; }
    .builder-sec-check { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; font-weight: 700; }
    .builder-sec-check.full { background: var(--accent); border-color: var(--accent); color: #fff; }
    .builder-sec-check.partial { background: rgba(255,107,0,0.15); border-color: var(--accent); color: var(--accent); }
    .builder-sec-name { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; flex: 1; }
    .builder-sec-count { font-size: 11px; color: var(--dim); }
    .builder-sec-chevron { font-size: 11px; color: var(--dim); transition: transform 0.15s; }
    .builder-sec-chevron.open { transform: rotate(180deg); }
    .builder-sec-body { padding: 0 12px 8px; }
    .builder-group { margin-top: 8px; }
    .builder-group-label { display: flex; align-items: center; gap: 8px; padding: 4px 0 4px 4px; }
    .builder-group-check { width: 17px; height: 17px; border-radius: 4px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; font-weight: 700; }
    .builder-group-check.full { background: rgba(48,209,88,0.85); border-color: var(--green); color: #fff; }
    .builder-group-check.partial { background: rgba(48,209,88,0.15); border-color: var(--green); color: var(--green); }
    .builder-group-name { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; color: var(--dim); text-transform: uppercase; flex: 1; }
    .builder-item { display: flex; align-items: center; gap: 10px; padding: 6px 4px 6px 26px; border-top: 1px solid rgba(255,255,255,0.04); }
    .builder-item-check { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; font-weight: 700; cursor: pointer; }
    .builder-item-check.on { background: var(--green); border-color: var(--green); color: #fff; }
    .builder-item-label { font-size: 14px; flex: 1; line-height: 1.3; cursor: pointer; }
    .builder-item-label.off { opacity: 0.35; text-decoration: line-through; }
    .builder-footer { padding: 12px 16px; flex-shrink: 0; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .builder-select-all { font-size: 11px; font-weight: 700; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; }
    .builder-clear-all { font-size: 11px; font-weight: 700; color: var(--dim); background: none; border: none; cursor: pointer; padding: 0; }

    /* ── DAY BADGES ── */
    .day-badges { display: flex; gap: 3px; flex-shrink: 0; }

    .day-badge {
      font-size: 10px;
      font-weight: 800;
      color: var(--green);
      background: rgba(48, 209, 88, 0.15);
      border: 1px solid rgba(48, 209, 88, 0.25);
      border-radius: 4px;
      padding: 2px 5px;
      letter-spacing: 0.3px;
    }

    /* ── TIME CONTROLS (cardio) ── */
    .time-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .time-btn {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: none;
      background: var(--card2);
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .time-display {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      min-width: 38px;
      text-align: center;
    }

    /* ── REST DAY ── */
    .rest-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 14px;
      text-align: center;
    }

    .rest-day .rest-icon  { font-size: 60px; }
    .rest-day .rest-title { font-size: 22px; font-weight: 800; }
    .rest-day .rest-sub   { font-size: 15px; color: var(--dim); line-height: 1.5; }
    .rest-settings-link   { background: none; border: none; color: var(--accent); font-size: 15px; font-weight: 700; cursor: pointer; padding: 0; text-decoration: underline; }

    /* ── FOOTER ── */
    .app-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 8px 16px 12px;
      background: var(--card);
      border-top: 1px solid var(--border);
    }

    .reset-btn {
      width: 65%;
      display: block;
      margin: 0 auto;
      padding: 9px;
      border: none;
      border-radius: 10px;
      background: rgba(255,107,0,0.15);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    .reset-btn:active { background: rgba(255,69,58,0.25); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }
    .modal-overlay.centered {
      align-items: center;
      padding-bottom: 16px;
    }

    .modal {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
    }

    .modal h3  { font-size: 19px; font-weight: 800; margin-bottom: 8px; }
    .modal p   { font-size: 15px; color: var(--dim); margin-bottom: 22px; line-height: 1.5; }

    .modal-actions { display: flex; gap: 10px; }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .modal-btn.cancel  { background: var(--card2); color: var(--text); }
    .modal-btn.confirm { background: var(--accent); color: #fff; }
    .modal-btn.danger  { background: rgba(255,69,58,0.15); color: var(--red); }

    .modal-input {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card2);
      color: var(--text);
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
      font-family: inherit;
    }
    .modal-input:focus { border-color: var(--accent); }

    /* ── EDIT MODE ── */
    .app-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .header-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      padding: 6px 10px;
      border: none;
      border-radius: 8px;
      background: var(--card2);
      color: var(--dim);
      font-size: 16px;
      cursor: pointer;
    }
    .edit-toggle {
      padding: 6px 16px;
      border: none;
      border-radius: 8px;
      background: var(--card2);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .edit-toggle.active { background: var(--accent); color: #fff; }
    .complete-btn, .finish-btn {
      padding: 6px 14px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      min-height: 44px; min-width: 100px;
      display: flex; align-items: center; justify-content: center;
    }
    .complete-btn { background: rgba(48,209,88,0.15);  color: var(--green);  }
    .finish-btn   { background: rgba(255,107,0,0.15);  color: var(--accent); }
    .sum-header { margin-bottom: 12px; }
    .sum-title { font-size: 18px; font-weight: 800; color: var(--green); }
    .sum-date { font-size: 12px; color: var(--dim); margin-top: 2px; }
    .sum-stat { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
    .sum-sections { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .sum-row { display: flex; justify-content: space-between; font-size: 13px; }
    .sum-name { color: var(--text); font-weight: 600; }
    .sum-count { color: var(--green); font-weight: 700; }
    .sum-kudos { font-size: 13px; color: var(--dim); font-style: italic; margin-bottom: 16px; line-height: 1.5; }

    .drag-handle {
      color: var(--dim); font-size: 20px; padding-right: 10px;
      cursor: grab; touch-action: none; user-select: none; flex-shrink: 0;
    }
    .section.dragging          { opacity: 0.35; }
    .section.drag-over         { outline: 2px solid var(--accent); border-radius: 12px; }
    .group-container.dragging  { opacity: 0.35; }
    .group-container.drag-over { outline: 2px solid var(--accent); border-radius: 8px; }
    .exercise-item.dragging    { opacity: 0.35; background: rgba(255,107,0,0.08); }
    .exercise-item.drag-over   { outline: 2px solid var(--accent); border-radius: 8px; }
    .add-section-btn {
      width: 100%; padding: 11px; margin-top: 8px;
      border: 1.5px dashed var(--card2); border-radius: 12px;
      background: transparent; color: var(--dim);
      font-size: 14px; font-weight: 700; cursor: pointer;
    }

    .streak-badge { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0; margin-left: 6px; }
    .stats-card { display:flex; margin: 8px 0 2px; background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    .stats-cell { flex: 1; padding: 7px 4px; text-align: center; }
    .stats-cell + .stats-cell { border-left: 1px solid var(--border); }
    .stats-label { font-size: 9px; color: var(--dim); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .stats-value { font-size: 14px; font-weight: 800; color: var(--text); margin-top: 1px; }
    .sched-modal { max-height: 85vh; display: flex; flex-direction: column; padding: 0; overflow: hidden; }
    .sched-modal-body { flex: 1; overflow-y: auto; padding: 24px 24px 0; }
    .sched-modal .modal-actions { flex-shrink: 0; padding: 12px 24px calc(16px + env(safe-area-inset-bottom)); background: var(--card); box-shadow: 0 -12px 12px 4px var(--card); }
    .hist-modal  { max-height: 85vh; overflow-y: auto; }
    .hist-list   { display: flex; flex-direction: column; gap: 16px; }
    .hist-week   { background: var(--card2); border-radius: 10px; padding: 10px 12px; }
    .hist-week-hdr { font-size: 12px; font-weight: 800; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .hist-row    { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 4px 0; border-top: 1px solid var(--border); }
    .hist-date   { color: var(--dim); font-weight: 600; min-width: 52px; }
    .hist-type   { color: var(--text); font-weight: 600; flex: 1; }
    .hist-stat   { color: var(--green); font-weight: 700; }
    .settings-section { margin-bottom: 16px; }
    .settings-section-hdr { font-size: 10px; font-weight: 700; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .sched-list { display: flex; flex-direction: column; gap: 4px; }
    .sched-header { display: flex; align-items: center; gap: 6px; padding: 2px 10px 6px; }
    .sched-hdr-day { width: 32px; flex-shrink: 0; font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--dim); text-transform: uppercase; }
    .sched-hdr-col { flex: 1; font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--dim); text-transform: uppercase; text-align: center; }
    .sched-hdr-div { width: 1px; flex-shrink: 0; height: 12px; background: var(--border); }
    .sched-row { display: flex; align-items: flex-start; gap: 6px; background: var(--card2); border-radius: 10px; padding: 6px 10px; }
    .sched-day { width: 32px; font-weight: 700; font-size: 13px; color: var(--text); flex-shrink: 0; padding-top: 4px; }
    .sched-strength-col { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .sched-v-divider { width: 1px; background: var(--border); align-self: stretch; flex-shrink: 0; }
    .sched-exercise-col { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .sched-exercise-col.rest { opacity: 0.25; pointer-events: none; }
    .sched-btn {
      width: 100%; padding: 4px 2px; border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--dim); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center;
    }
    .sched-btn.sel { border-color: var(--accent); color: var(--accent); background: rgba(255,107,0,0.1); }
    .sched-opt-btn {
      width: 100%; padding: 3px 2px; border: 1px dashed var(--border); border-radius: 6px;
      background: transparent; color: var(--dim); font-size: 10px; font-weight: 600; cursor: pointer; text-align: center;
    }
    .sched-opt-btn.sel { border-color: var(--green); border-style: solid; color: var(--green); background: rgba(48,209,88,0.08); }

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────

const KEY       = 'wl26';
const KEY_COL   = 'wl26_col';
const KEY_EX    = 'wl26_ex';
const KEY_SCHED  = 'wl26_sched';
const KEY_DONE   = 'wl26_done';
const KEY_HIST   = 'wl26_history';
const KEY_PREFS  = 'wl26_prefs';
const KEY_VER    = 'wl26_ver';
const KEY_NOTES  = 'wl26_notes';
const KEY_HIDDEN = 'wl26_hidden';

const APP_VERSION = '3.6';

// 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
function makeDayCfg(type, opts={}) {
  return { type, warmup: !!opts.warmup, cardio: !!opts.cardio, core: !!opts.core, yoga: !!opts.yoga };
}
const DEFAULT_SCHEDULE = {
  0: makeDayCfg(null),
  1: makeDayCfg('fullBody', { warmup: true }),
  2: makeDayCfg('legs',     { warmup: true, core: true }),
  3: makeDayCfg('fullBody', { warmup: true }),
  4: makeDayCfg('legs',     { warmup: true, core: true }),
  5: makeDayCfg('fullBody', { warmup: true }),
  6: makeDayCfg(null),
};

let statsMode        = 'off'; // 'off' | 'auto' | 'always'
let autoExport       = false;
let builderMode      = false; // workout builder toggle
let builderSelections = {}; // { dayKey: { itemId: true } } — selected exercises per day
let builderDay       = null; // currently viewed day in builder modal
let trainerNotes     = { enabled: false, notes: [] }; // { header, body }[]
let hiddenExercises  = {}; // { itemId: true }
let schedule         = JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));
let state            = {};
let collapsed        = {};
let customExercises  = null;
let editMode         = false;
let showHidden       = false; // edit mode toggle
let modal            = null;
let completedDays    = {};
let workoutHistory   = [];

function loadSchedule() {
  try {
    const r = localStorage.getItem(KEY_SCHED);
    if (r) {
      const s = JSON.parse(r);
      // Migrate old format (string values) to new object format
      Object.keys(s).forEach(k => {
        if (s[k] === null || typeof s[k] === 'string') {
          const oldType = s[k];
          const type = oldType === 'legsCore' ? 'legs' : oldType;
          s[k] = makeDayCfg(type, { warmup: !!oldType, core: oldType === 'legsCore' });
        } else if (s[k] && s[k].type === 'legsCore') {
          s[k].type = 'legs'; // migrate old 'legsCore' type value
        }
      });
      schedule = s;
    }
  } catch(e) {}
}
function saveSchedule()      { localStorage.setItem(KEY_SCHED, JSON.stringify(schedule)); }
function saveHidden()        { localStorage.setItem(KEY_HIDDEN, JSON.stringify(hiddenExercises)); }
function toggleHidden(id)    { hiddenExercises[id] = !hiddenExercises[id]; if (!hiddenExercises[id]) delete hiddenExercises[id]; saveHidden(); render(); }
function saveHistory()       { localStorage.setItem(KEY_HIST,  JSON.stringify(workoutHistory)); }
function savePrefs()        { localStorage.setItem(KEY_PREFS, JSON.stringify({ statsMode, autoExport, builderMode, builderSelections })); }
function setStatsMode(mode) { statsMode = mode; savePrefs(); render(); }
function toggleAutoExport() { autoExport = !autoExport; savePrefs(); render(); }
function toggleBuilderMode() { builderMode = !builderMode; savePrefs(); render(); }
function openWorkoutBuilder() {
  builderDay = builderDay || dateKey(currentDate);
  modal = { type: 'workoutBuilder' };
  render();
}
function builderSwitchDay(dk) { builderDay = dk; render(); }
function builderToggleItem(dk, itemId) {
  if (!builderSelections[dk]) builderSelections[dk] = {};
  if (builderSelections[dk][itemId]) delete builderSelections[dk][itemId];
  else builderSelections[dk][itemId] = true;
  render();
}
function builderSelectAll(dk, ids) {
  if (!builderSelections[dk]) builderSelections[dk] = {};
  ids.forEach(id => builderSelections[dk][id] = true);
  render();
}
function builderClearAll(dk, ids) {
  if (!builderSelections[dk]) builderSelections[dk] = {};
  ids.forEach(id => delete builderSelections[dk][id]);
  render();
}
function builderToggleSection(secId) {
  const el = document.getElementById('bld-body-' + secId);
  const ch = document.getElementById('bld-chev-' + secId);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
  if (ch) ch.classList.toggle('open');
}
function openBuilderCopyModal() {
  modal = { type: 'builderCopy', srcDay: builderDay || dateKey(currentDate) };
  render();
}
function doBuilderCopy(targetDays) {
  const src = builderSelections[modal.srcDay] || {};
  targetDays.forEach(dk => { builderSelections[dk] = Object.assign({}, src); });
  savePrefs();
  modal = { type: 'workoutBuilder' };
  render();
}

function getDefaultDate() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d;
}

let currentDate = getDefaultDate();

function loadState() {
  loadSchedule();
  try { state           = JSON.parse(localStorage.getItem(KEY))      || {}; } catch(e) { state = {}; }
  try { collapsed       = JSON.parse(localStorage.getItem(KEY_COL))  || {}; } catch(e) { collapsed = {}; }
  try { completedDays   = JSON.parse(localStorage.getItem(KEY_DONE)) || {}; } catch(e) { completedDays = {}; }
  try { workoutHistory  = JSON.parse(localStorage.getItem(KEY_HIST)) || []; } catch(e) { workoutHistory = []; }
  try { const p = localStorage.getItem(KEY_PREFS); if (p) { const prefs = JSON.parse(p); statsMode = prefs.statsMode || 'off'; autoExport = !!prefs.autoExport; builderMode = !!prefs.builderMode; builderSelections = prefs.builderSelections || {}; } } catch(e) {}
  try { const r = localStorage.getItem(KEY_EX);    if (r) customExercises = JSON.parse(r); } catch(e) {}
  try { const n = localStorage.getItem(KEY_NOTES); if (n) trainerNotes  = JSON.parse(n); } catch(e) {}
  try { const h = localStorage.getItem(KEY_HIDDEN); if (h) hiddenExercises = JSON.parse(h); } catch(e) {}
  migrateExercises();
}

function migrateExercises() {
  // v3.5: restructure — warmup/cardio/core/yoga moved to EXERCISES.shared
  if (!customExercises) return;
  let dirty = false;

  // Ensure shared array exists
  if (!customExercises.shared) {
    customExercises.shared = JSON.parse(JSON.stringify(EXERCISES.shared));
    dirty = true;
  }

  // Move warmup out of legsCore if still there
  if (customExercises.legsCore) {
    const warmupIdx = customExercises.legsCore.findIndex(s => s.id === 'warmup');
    if (warmupIdx !== -1) {
      const [warmup] = customExercises.legsCore.splice(warmupIdx, 1);
      const existing = customExercises.shared.findIndex(s => s.id === 'warmup');
      if (existing === -1) customExercises.shared.unshift(warmup);
      else customExercises.shared[existing] = warmup;
      dirty = true;
    }
    // Move core out of legsCore if still there
    const coreIdx = customExercises.legsCore.findIndex(s => s.id === 'core');
    if (coreIdx !== -1) {
      const [core] = customExercises.legsCore.splice(coreIdx, 1);
      const existing = customExercises.shared.findIndex(s => s.id === 'core');
      if (existing === -1) customExercises.shared.splice(2, 0, core);
      else customExercises.shared[existing] = core;
      dirty = true;
    }
  }

  // Move cardio out of fullBody if still there
  if (customExercises.fullBody) {
    const cardioIdx = customExercises.fullBody.findIndex(s => s.id === 'cardio');
    if (cardioIdx !== -1) {
      const [cardio] = customExercises.fullBody.splice(cardioIdx, 1);
      const existing = customExercises.shared.findIndex(s => s.id === 'cardio');
      if (existing === -1) customExercises.shared.splice(1, 0, cardio);
      else customExercises.shared[existing] = cardio;
      dirty = true;
    }
    // Move yoga out of fullBody if still there
    const yogaIdx = customExercises.fullBody.findIndex(s => s.id === 'yoga');
    if (yogaIdx !== -1) {
      const [yoga] = customExercises.fullBody.splice(yogaIdx, 1);
      const existing = customExercises.shared.findIndex(s => s.id === 'yoga');
      if (existing === -1) customExercises.shared.push(yoga);
      else customExercises.shared[existing] = yoga;
      dirty = true;
    }
  }

  // ── Content upgrades for shared sections ────────────────────────────────

  const sharedCardio = customExercises.shared.find(s => s.id === 'cardio');
  if (sharedCardio) {
    // Detect old cardio: missing Freestyle Run (cd1b) means pre-v3.5 content
    const allItems = sharedCardio.groups.flatMap(g => g.items);
    const hasFreestyle = allItems.some(i => i.id === 'cd1b');
    if (!hasFreestyle) {
      // Replace entire cardio section with current default
      const defaultCardio = JSON.parse(JSON.stringify(EXERCISES.shared.find(s => s.id === 'cardio')));
      const idx = customExercises.shared.findIndex(s => s.id === 'cardio');
      customExercises.shared[idx] = defaultCardio;
      dirty = true;
    }
  }

  const sharedWarmup = customExercises.shared.find(s => s.id === 'warmup');
  if (sharedWarmup) {
    // Ensure YOGA group exists
    if (!sharedWarmup.groups.find(g => g.name === 'YOGA')) {
      sharedWarmup.groups.splice(1, 0, { name: 'YOGA', items: [
        { id: 'wu9',  label: 'Dynamic Movement (flow)', timed: true },
        { id: 'wu10', label: 'Static Stretching (hold)', timed: true },
      ]});
      dirty = true;
    }
    // Ensure STATIC STRETCHING group exists
    if (!sharedWarmup.groups.find(g => g.name === 'STATIC STRETCHING')) {
      const yogaIdx = sharedWarmup.groups.findIndex(g => g.name === 'YOGA');
      sharedWarmup.groups.splice(yogaIdx + 1, 0, { name: 'STATIC STRETCHING', items: [
        { id: 'wu3', label: 'Warm Up (active)',  timed: true },
        { id: 'wu4', label: 'Warm Up (passive)', timed: true },
        { id: 'wu5', label: 'Cooldown (active)', timed: true },
        { id: 'wu6', label: 'Cooldown (passive)', timed: true },
      ]});
      dirty = true;
    }
    // Remove STRETCHING VIDEOS group if present (removed from defaults in v3.5.3)
    const svIdx = sharedWarmup.groups.findIndex(g => g.name === 'STRETCHING VIDEOS');
    if (svIdx !== -1) { sharedWarmup.groups.splice(svIdx, 1); dirty = true; }
    // Remove "(5-10 min)" from any labels & fix "Warmup" → "Warm Up"
    sharedWarmup.groups.forEach(g => g.items.forEach(item => {
      const fixed = item.label.replace(/\s*\(5-10 min\)/gi, '').replace(/\bWarmup\b/g, 'Warm Up');
      if (fixed !== item.label) { item.label = fixed; dirty = true; }
      item.timed = true;
    }));
  }

  // Remove old standalone Stretching section (merged into Warm Up / Cool Down)
  if (customExercises.fullBody) {
    const stretchIdx = customExercises.fullBody.findIndex(s => s.id === 'stretching');
    if (stretchIdx !== -1) { customExercises.fullBody.splice(stretchIdx, 1); dirty = true; }
  }
  if (customExercises.legsCore) {
    const stretchIdx = customExercises.legsCore.findIndex(s => s.id === 'stretching');
    if (stretchIdx !== -1) { customExercises.legsCore.splice(stretchIdx, 1); dirty = true; }
  }
  if (customExercises.shared) {
    const stretchIdx = customExercises.shared.findIndex(s => s.id === 'stretching');
    if (stretchIdx !== -1) { customExercises.shared.splice(stretchIdx, 1); dirty = true; }
  }

  // Fix "HIT " → "HIIT " across all stored exercises
  const fixHIIT = (sections) => {
    if (!sections) return;
    sections.forEach(sec => sec.groups && sec.groups.forEach(g => g.items && g.items.forEach(item => {
      const fixed = item.label.replace(/\bHIT\b(?!T)/g, 'HIIT');
      if (fixed !== item.label) { item.label = fixed; dirty = true; }
    })));
  };
  fixHIIT(customExercises.shared);
  fixHIIT(customExercises.fullBody);
  fixHIIT(customExercises.legsCore);

  // Rename specific exercises in stored data
  const fixLabels = (sections) => {
    if (!sections) return;
    sections.forEach(sec => sec.groups && sec.groups.forEach(g => g.items && g.items.forEach(item => {
      if (item.id === 'co10' && item.label === 'Mat side ankle touch') { item.label = 'Mat heel touch'; dirty = true; }
    })));
  };
  fixLabels(customExercises.shared);
  fixLabels(customExercises.fullBody);
  fixLabels(customExercises.legsCore);

  // Add missing Crunches items if not present
  const coreShared = customExercises.shared?.find(s => s.id === 'core');
  const coreLegs = customExercises.legsCore?.find(s => s.id === 'core');
  [coreShared, coreLegs].forEach(core => {
    if (!core) return;
    const crunches = core.groups?.find(g => g.name === 'Crunches');
    if (crunches && !crunches.items.find(i => i.id === 'co22')) {
      crunches.items.push({ id: 'co22', label: 'Weighted side bend' });
      dirty = true;
    }
  });

  // Remove Core Videos group if present (removed from defaults in v3.5.3)
  [customExercises.shared, customExercises.legsCore].forEach(sections => {
    const coreSec = sections?.find(s => s.id === 'core');
    if (!coreSec) return;
    const cvIdx = coreSec.groups?.findIndex(g => g.name === 'Core Videos');
    if (cvIdx !== -1 && cvIdx !== undefined) { coreSec.groups.splice(cvIdx, 1); dirty = true; }
  });

  if (dirty) saveCustomExercises();
}

function saveState()          { localStorage.setItem(KEY,        JSON.stringify(state)); }
function saveCollapsed()      { localStorage.setItem(KEY_COL,    JSON.stringify(collapsed)); }
function saveCustomExercises(){ localStorage.setItem(KEY_EX,     JSON.stringify(customExercises)); }
function saveCompletedDays()  { localStorage.setItem(KEY_DONE,   JSON.stringify(completedDays)); }
function saveTrainerNotes()   { localStorage.setItem(KEY_NOTES,  JSON.stringify(trainerNotes)); }

function getExercises() { return customExercises || EXERCISES; }

function ensureCustomExercises() {
  if (!customExercises) customExercises = JSON.parse(JSON.stringify(EXERCISES));
}

function dateKey(d) { return d.toISOString().slice(0, 10); }

function getDayState(d) {
  const k = dateKey(d);
  if (!state[k]) state[k] = { checked: {}, times: {} };
  if (!state[k].times) state[k].times = {};
  return state[k];
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// HELPERS

function getMonday(d) {
  const date = new Date(d);
  const day  = date.getDay();
  date.setDate(date.getDate() + (day === 0 ? -6 : 1 - day));
  date.setHours(0, 0, 0, 0);
  return date;
}

function getWeekDays(d) {
  const mon = getMonday(d);
  return Array.from({ length: 7 }, (_, i) => {
    const day = new Date(mon);
    day.setDate(day.getDate() + i);
    return day;
  });
}

function getDayCfg(d) {
  const entry = schedule[d.getDay()];
  if (!entry) return makeDayCfg(null);
  if (typeof entry === 'string' || entry === null) return makeDayCfg(entry); // fallback
  return entry;
}
function getWorkoutType(d) {
  return getDayCfg(d).type || null;
}

const DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
function getScheduledDaysLabel(type) {
  return Object.entries(schedule)
    .filter(([,v]) => (v?.type ?? v) === type)
    .map(([k]) => DAY_NAMES[+k])
    .join(' · ');
}

function hasAnyProgress(d) {
  const ds = getDayState(d);
  return Object.values(ds.checked || {}).some(Boolean);
}

function getSharedSec(id) {
  return (getExercises()['shared'] || []).filter(s => s.id === id);
}
function getExercisesForType(type, cfg) {
  // cfg = { warmup, cardio, core, yoga }
  const ex = getExercises();
  const shared = ex['shared'] || [];
  const sharedById = id => shared.filter(s => s.id === id);

  let main = [];
  if (type === 'combined') main = [...(ex['fullBody'] || []), ...(ex['legsCore'] || [])];
  else if (type === 'legs') main = ex['legsCore'] || [];
  else main = ex[type] || [];

  const c = cfg || {};
  return [
    ...(c.warmup ? sharedById('warmup') : []),
    ...main,
    ...(c.cardio ? sharedById('cardio') : []),
    ...(c.core   ? sharedById('core')   : []),
    ...(c.yoga   ? sharedById('yoga')   : []),
  ];
}

function getProgress(type, d) {
  const ds  = getDayState(d);
  const sel = builderMode ? (builderSelections[dateKey(d)] || {}) : null;
  let total = 0, done = 0;
  getAllSections().forEach(sec =>
    sec.groups.forEach(g =>
      g.items.forEach(item => {
        if (hiddenExercises[item.id]) return;
        if (sel && !sel[item.id]) return; // builder filter
        total++; if (ds.checked[item.id]) done++;
      })
    )
  );
  return { done, total };
}

function getSectionProgress(secId, type, d) {
  const ds  = getDayState(d);
  const sel = builderMode ? (builderSelections[dateKey(d)] || {}) : null;
  const sec = getAllSections().find(s => s.id === secId);
  if (!sec) return { done: 0, total: 0 };
  let total = 0, done = 0;
  sec.groups.forEach(g =>
    g.items.forEach(item => {
      if (sel && !sel[item.id]) return; // builder filter
      total++; if (ds.checked[item.id]) done++;
    })
  );
  return { done, total };
}

// Returns every section from all workout types + shared — used by builder mode
function getAllSections() {
  const ex = getExercises();
  const shared = ex['shared'] || [];
  return [
    ...shared.filter(s => s.id === 'warmup'),
    ...(ex['fullBody']  || []),
    ...(ex['legsCore']  || []),
    ...shared.filter(s => s.id === 'cardio'),
    ...shared.filter(s => s.id === 'core'),
    ...shared.filter(s => s.id === 'yoga'),
  ];
}

function getStreak() {
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(today);
  for (let i = 0; i < 365; i++) {
    const dk   = dateKey(d);
    const type = getWorkoutType(d);
    if (type) {
      if (completedDays[dk]) {
        streak++;
      } else if (dk !== dateKey(today)) {
        break;
      }
    }
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function toggleExercise(id) {
  const ds = getDayState(currentDate);
  if (ds.checked[id]) { delete ds.checked[id]; delete ds.times[id]; }
  else { ds.checked[id] = true; }
  saveState();
  render();
}

function adjustTime(id, delta) {
  const ds = getDayState(currentDate);
  const cur = ds.times[id] || 0;
  ds.times[id] = Math.max(0, Math.min(120, cur + delta));
  saveState();
  const el = document.querySelector(`[data-time="${id}"]`);
  if (el) el.textContent = ds.times[id] > 0 ? ds.times[id] + 'm' : '—';
}

function switchDay(iso) {
  currentDate = new Date(iso + 'T00:00:00');
  render();
}

function toggleSection(id) {
  const isCollapsed = collapsed[id] !== false;
  collapsed[id] = !isCollapsed;
  saveCollapsed();
  render();
}

function expandAll() {
  const type = getWorkoutType(currentDate);
  if (!type) return;
  getExercisesForType(type, getDayCfg(currentDate)).forEach(s => { collapsed[s.id] = false; });
  saveCollapsed();
  render();
}

function collapseAll() {
  const type = getWorkoutType(currentDate);
  if (!type) return;
  getExercisesForType(type, getDayCfg(currentDate)).forEach(s => { collapsed[s.id] = true; });
  saveCollapsed();
  render();
}

function saveModalEdit() {
  const input = document.getElementById('modal-input');
  const val = input ? input.value.trim() : '';
  if (!val) return;

  if (modal.type === 'editEx') {
    const urlVal = document.getElementById('modal-url-input')?.value.trim() || '';
    ensureCustomExercises();
    const sec = customExercises[modal.workoutType].find(s => s.id === modal.sectionId);
    if (sec) {
      sec.groups.forEach(g => {
        const item = g.items.find(i => i.id === modal.id);
        if (item) {
          item.label = val;
          if (urlVal) item.url = urlVal;
          else delete item.url;
        }
      });
      saveCustomExercises();
    }
  } else if (modal.type === 'add') {
    ensureCustomExercises();
    const sec = customExercises[modal.workoutType].find(s => s.id === modal.sectionId);
    if (sec) {
      const group = sec.groups.find(g => g.name === modal.groupName);
      if (group) group.items.push({ id: 'u' + Date.now(), label: val, custom: true });
      saveCustomExercises();
    }
  }
  modal = null;
  render();
}

// ── DRAG-TO-REORDER SECTIONS ──────────────────
let drag = null;
function startDrag(e, idx, type) {
  e.preventDefault(); e.stopPropagation();
  drag = { srcIdx: idx, type, overIdx: idx };
  document.querySelector(`[data-sec-idx="${idx}"]`)?.classList.add('dragging');
}
function _dragMove(clientY) {
  if (!drag) return;
  const sections = [...document.querySelectorAll('[data-sec-idx]')];
  let overIdx = drag.srcIdx;
  sections.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (clientY > rect.top + rect.height / 2) overIdx = parseInt(el.dataset.secIdx);
  });
  if (overIdx !== drag.overIdx) {
    sections.forEach(el => el.classList.remove('drag-over'));
    document.querySelector(`[data-sec-idx="${overIdx}"]`)?.classList.add('drag-over');
    drag.overIdx = overIdx;
  }
}
function _dragEnd(clientY) {
  if (!drag) return;
  const { srcIdx, type, overIdx } = drag;
  drag = null;
  if (overIdx !== srcIdx) {
    ensureCustomExercises();
    const arr = customExercises[type];
    const [removed] = arr.splice(srcIdx, 1);
    arr.splice(overIdx, 0, removed);
    saveCustomExercises();
  }
  render();
}

// ── DRAG-TO-REORDER GROUPS ────────────────────
let grpDrag = null;
function startGroupDrag(e, type, secId, gIdx) {
  e.preventDefault(); e.stopPropagation();
  grpDrag = { type, secId, srcIdx: gIdx, overIdx: gIdx };
  document.querySelector(`[data-group-idx="${gIdx}"][data-sec-id="${secId}"]`)?.classList.add('dragging');
}
function _grpDragMove(clientY) {
  if (!grpDrag) return;
  const els = [...document.querySelectorAll(`[data-group-idx][data-sec-id="${grpDrag.secId}"]`)];
  let overIdx = grpDrag.srcIdx;
  els.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (clientY > rect.top + rect.height / 2) overIdx = parseInt(el.dataset.groupIdx);
  });
  if (overIdx !== grpDrag.overIdx) {
    els.forEach(el => el.classList.remove('drag-over'));
    document.querySelector(`[data-group-idx="${overIdx}"][data-sec-id="${grpDrag.secId}"]`)?.classList.add('drag-over');
    grpDrag.overIdx = overIdx;
  }
}
function _grpDragEnd() {
  if (!grpDrag) return;
  const { type, secId, srcIdx, overIdx } = grpDrag;
  grpDrag = null;
  if (overIdx !== srcIdx) {
    ensureCustomExercises();
    const sec = customExercises[type].find(s => s.id === secId);
    if (sec) { const [r] = sec.groups.splice(srcIdx, 1); sec.groups.splice(overIdx, 0, r); saveCustomExercises(); }
  }
  render();
}

let exDrag = null;
function startExerciseDrag(e, type, secId, gIdx, iIdx) {

document.addEventListener('touchmove', e => {
  if (drag) { e.preventDefault(); _dragMove(e.touches[0].clientY); }
  else if (grpDrag) { e.preventDefault(); _grpDragMove(e.touches[0].clientY); }
  else if (exDrag)  { e.preventDefault(); _exDragMove(e.touches[0].clientY); }
}, { passive: false });
document.addEventListener('touchend', e => {
  if (drag) _dragEnd(e.changedTouches[0].clientY);
  else if (grpDrag) _grpDragEnd();
  else if (exDrag)  _exDragEnd();
});
document.addEventListener('mousemove', e => {
  if (drag) _dragMove(e.clientY);
  else if (grpDrag) _grpDragMove(e.clientY);
  else if (exDrag)  _exDragMove(e.clientY);
});
document.addEventListener('mouseup', e => {
  if (drag) _dragEnd(e.clientY);
  else if (grpDrag) _grpDragEnd();
  else if (exDrag)  _exDragEnd();
});

const KUDOS = [
  "Beast mode. You showed up and put in the work.",
  "Another day, another win. Keep stacking them.",
  "That's what dedication looks like. Well done.",
  "You came, you lifted, you crushed it.",
  "One more session in the books. Keep going.",
  "Consistency is the game — you're playing it right.",
  "Strong work today. Your future self thanks you."
];

function markComplete() {
  completedDays[dateKey(currentDate)] = true;
  saveCompletedDays();
  if (autoExport) exportData();
  showSummary();
}

function showSummary() {
  const type = getWorkoutType(currentDate);
  if (!type) return;
  const ds = getDayState(currentDate);
  let totalDone = 0, totalAll = 0;
  const sectionSummaries = [];
  getExercisesForType(type, getDayCfg(currentDate)).forEach(sec => {
    let secDone = 0, secTotal = 0;
    sec.groups.forEach(g => g.items.forEach(item => {
      secTotal++;
      if (ds.checked[item.id]) { secDone++; totalDone++; }
      totalAll++;
    }));
    if (secDone > 0) sectionSummaries.push({ name: sec.name, done: secDone, total: secTotal });
  });
  const kudos = KUDOS[Math.floor(Math.random() * KUDOS.length)];
  modal = { type: 'summary', totalDone, totalAll, sectionSummaries, kudos };
  render();
}
function setSchedDay(i, type) {
  const prev = modal.draft[i] || makeDayCfg(null);
  modal.draft[i] = makeDayCfg(type, { warmup: prev.warmup, cardio: prev.cardio, core: prev.core, yoga: prev.yoga });
  render();
}
function toggleSchedOpt(i, opt) {
  const cur = modal.draft[i] || makeDayCfg(null);
  modal.draft[i] = Object.assign({}, cur, { [opt]: !cur[opt] });
  render();
}
function saveSettings() {
  schedule = Object.assign({}, modal.draft);
  saveSchedule();
  modal = null;
  currentDate = getDefaultDate();
  render();
}

function doReset() {
  const weekDays  = getWeekDays(currentDate);
  const weekStart = dateKey(weekDays[0]);
  const weekEnd   = dateKey(weekDays[weekDays.length - 1]);
  const exercises = getExercises();

  // Build per-day summary for archive
  const days = weekDays.map(d => {
    const dk   = dateKey(d);
    const type = getWorkoutType(d);
    if (!type) return null;
    let done = 0, total = 0;
    getExercisesForType(type, getDayCfg(currentDate)).forEach(sec =>
      sec.groups.forEach(g => g.items.forEach(item => {
        total++;
        if (state[dk]?.checked?.[item.id]) done++;
      }))
    );
    if (total === 0) return null;
    return { date: dk, type, done, total, completed: !!completedDays[dk] };
  }).filter(Boolean);

  if (days.length > 0) {
    workoutHistory.unshift({ weekStart, weekEnd, days });
    saveHistory();
  }

  weekDays.forEach(d => {
    delete state[dateKey(d)];
    delete completedDays[dateKey(d)];
  });
  saveState();
  saveCompletedDays();
  modal = null;
  render();
}

function openHistory() { modal = { type: 'history' }; render(); }

function exportData() {
  const data = {
    exportedAt:      new Date().toISOString(),
    version:         'wl26',
    schedule:        JSON.parse(localStorage.getItem(KEY_SCHED) || '{}'),
    state:           JSON.parse(localStorage.getItem(KEY)       || '{}'),
    completedDays:   JSON.parse(localStorage.getItem(KEY_DONE)  || '{}'),
    workoutHistory:  JSON.parse(localStorage.getItem(KEY_HIST)  || '[]'),
    customExercises: JSON.parse(localStorage.getItem(KEY_EX)    || 'null'),
    prefs:           JSON.parse(localStorage.getItem(KEY_PREFS) || '{}'),
    trainerNotes:    JSON.parse(localStorage.getItem(KEY_NOTES) || 'null'),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `workout-log-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function triggerImport() {
  const input = document.getElementById('import-file-input');
  if (input) { input.value = ''; input.click(); }
}

function readImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.version !== 'wl26') {
        modal = { type: 'importError', message: 'This file doesn\'t look like a Workout Log backup.' };
        render(); return;
      }
      const exportedAt = data.exportedAt ? new Date(data.exportedAt).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' }) : 'unknown date';
      modal = { type: 'confirmImport', data, exportedAt };
      render();
    } catch(err) {
      modal = { type: 'importError', message: 'Could not read the file. Make sure it\'s a valid JSON backup.' };
      render();
    }
  };
  reader.readAsText(file);
}

function doImport() {
  const data = modal.data;
  if (data.schedule)        localStorage.setItem(KEY_SCHED,  JSON.stringify(data.schedule));
  if (data.state)           localStorage.setItem(KEY,        JSON.stringify(data.state));
  if (data.completedDays)   localStorage.setItem(KEY_DONE,   JSON.stringify(data.completedDays));
  if (data.workoutHistory)  localStorage.setItem(KEY_HIST,   JSON.stringify(data.workoutHistory));
  if (data.customExercises) localStorage.setItem(KEY_EX,     JSON.stringify(data.customExercises));
  if (data.prefs)           localStorage.setItem(KEY_PREFS,  JSON.stringify(data.prefs));
  if (data.trainerNotes)   localStorage.setItem(KEY_NOTES,  JSON.stringify(data.trainerNotes));
  modal = null;
  loadState();
  currentDate = getDefaultDate();
  render();
}

const DAY_LETTERS = ['M','T','W','T','F','S','S'];

function renderWeekTabs() {
  const monthAbbr = currentDate.toLocaleDateString('en-US', { month: 'short' });
  const tabs = getWeekDays(currentDate).map((d, i) => {
    const active      = dateKey(d) === dateKey(currentDate);
    const hasProgress = hasAnyProgress(d);
    const isWeekend   = d.getDay() === 6 || d.getDay() === 0;
    const cls = ['day-tab', isWeekend ? 'weekend' : '', active ? 'active' : '', (!active && hasProgress) ? 'has-progress' : '']
      .filter(Boolean).join(' ');
    return `<button class="${cls}" onclick="switchDay('${dateKey(d)}')">
      <span class="day-letter">${DAY_LETTERS[i]}</span>
      <span class="day-num">${d.getDate()}</span>
      <span class="day-dot"></span>
    </button>`;
  }).join('');
  return `<div class="week-tabs-month">${monthAbbr}</div><div class="week-tabs">${tabs}</div>`;
}

function renderExercise(item, ds, workoutType, sectionId, gIdx, iIdx) {
  const isHidden = !!hiddenExercises[item.id];

  if (editMode) {
    if (isHidden && !showHidden) return ''; // hidden items invisible unless showHidden is on
    const isCustom = !!item.custom; // custom items get delete, built-ins get hide
    const actionBtn = isHidden
      ? `<button class="hide-btn show" onclick="toggleHidden('${item.id}')">Show</button>`
      : isCustom
        ? `<button class="delete-btn" onclick="deleteExerciseDirect('${item.id}','${workoutType}','${sectionId}')">✕</button>`
        : `<button class="hide-btn" onclick="toggleHidden('${item.id}')">Hide</button>`;
    return `<div class="exercise-item${isHidden ? ' ex-hidden' : ''}" style="cursor:default" data-item-idx="${iIdx}" data-group-idx="${gIdx}" data-sec-id="${sectionId}">
      <span class="drag-handle" ontouchstart="startExerciseDrag(event,'${workoutType}','${sectionId}',${gIdx},${iIdx})" onmousedown="startExerciseDrag(event,'${workoutType}','${sectionId}',${gIdx},${iIdx})">≡</span>
      <span class="exercise-label" style="cursor:pointer;flex:1" onclick="openEditModal('${item.id}','${workoutType}','${sectionId}','${esc(item.label)}')">${esc(item.label)}</span>
      <span style="color:var(--dim);font-size:15px;flex-shrink:0;padding:0 6px;cursor:pointer" title="Move to…" onclick="openMoveModal('${workoutType}','${sectionId}',${gIdx},${iIdx})">⇄</span>
      ${actionBtn}
    </div>`;
  }

  if (isHidden) return ''; // hidden items never show in workout view

  const checked = !!ds.checked[item.id];
  const time    = ds.times[item.id] || 0;

  const doneDays = getWeekDays(currentDate).filter(d => {
    if (dateKey(d) === dateKey(currentDate)) return false;
    return !!state[dateKey(d)]?.checked?.[item.id];
  });
  const badgesHtml = doneDays.length
    ? `<div class="day-badges">${doneDays.map(d => `<span class="day-badge">${['S','M','T','W','T','F','S'][d.getDay()]}</span>`).join('')}</div>`
    : '';

  let timeHtml = '';
  if (item.timed && checked) {
    timeHtml = `<div class="time-controls" onclick="event.stopPropagation()">
      <button class="time-btn" onclick="adjustTime('${item.id}',-5)">−</button>
      <span class="time-display" data-time="${item.id}">${time > 0 ? time + 'm' : '—'}</span>
      <button class="time-btn" onclick="adjustTime('${item.id}',5)">+</button>
    </div>`;
  }

  const timedIcon = item.timed && !checked ? `<span class="timed-icon">⏱</span>` : '';
  const videoBtn  = item.url ? `<button class="video-link-btn" onclick="event.stopPropagation();window.open('${esc(item.url)}','_blank')" title="Watch video">🎬</button>` : '';
  return `<div class="exercise-item${checked ? ' checked' : ''}" onclick="toggleExercise('${item.id}')">
    <div class="checkbox"><span class="checkmark">✓</span></div>
    <span class="exercise-label">${esc(item.label)}</span>
    ${timedIcon}
    ${videoBtn}
    ${badgesHtml}
    ${timeHtml}
  </div>`;
}

function renderSection(sec, type, idx) {
  const ds          = getDayState(currentDate);
  const dk          = dateKey(currentDate);
  const sel         = builderMode ? (builderSelections[dk] || {}) : null; // null = builder off
  const isCollapsed = collapsed[sec.id] !== false;
  const { done, total } = getSectionProgress(sec.id, type, currentDate);
  const complete    = done === total && total > 0;

  const headerCls  = `section-header${isCollapsed ? '' : ' open'}`;
  const countCls   = `section-count${complete ? ' complete' : (done > 0 ? ' has-progress' : '')}`;
  const chevronCls = `chevron${isCollapsed ? '' : ' open'}`;

  let body = '';
  if (!isCollapsed) {
    const trainerNoteHtml = renderSectionTrainerNotes(sec.id);
    const groupsHtml = sec.groups.map((g, gIdx) => {
      // In builder mode, filter items to only selected ones
      const visibleItems = sel ? g.items.filter(item => sel[item.id]) : g.items;
      if (sel && visibleItems.length === 0) return ''; // skip empty groups in builder mode
      const grpLabel = g.name
        ? `<div class="group-label" style="${editMode ? 'display:flex;align-items:center;gap:6px;padding-right:8px' : ''}">
            ${editMode ? `<span class="drag-handle" style="font-size:15px" ontouchstart="startGroupDrag(event,'${type}','${sec.id}',${gIdx})" onmousedown="startGroupDrag(event,'${type}','${sec.id}',${gIdx})">≡</span>` : ''}
            <span style="flex:1;${editMode?'cursor:pointer':''}" onclick="${editMode?`openRenameGroupModal('${type}','${sec.id}',${gIdx},${esc(JSON.stringify(g.name))})`:''}">${g.name}${editMode ? ' <span style="color:var(--dim);font-size:11px">✎</span>' : ''}</span>
            ${editMode && g.custom ? `<button class="delete-btn" style="width:20px;height:20px;font-size:11px;flex-shrink:0" onclick="deleteGroup('${type}','${sec.id}',${gIdx})">✕</button>` : ''}
           </div>`
        : '';
      const items  = visibleItems.map((item, iIdx) => renderExercise(item, ds, type, sec.id, gIdx, iIdx)).join('');
      const addBtn = editMode
        ? `<button class="add-exercise-btn" onclick="openAddModal('${type}','${sec.id}',${esc(JSON.stringify(g.name))})">＋ Add to ${g.name || sec.name}</button>`
        : '';
      return `<div class="group-container" data-group-idx="${gIdx}" data-sec-id="${sec.id}">${grpLabel}${items}${addBtn}</div>`;
    }).join('');
    const addGroupBtn = editMode
      ? `<button class="add-exercise-btn" style="color:var(--dim);border-top:1px dashed var(--border)" onclick="openAddGroupModal('${type}','${sec.id}')">＋ Add Subheader</button>`
      : '';
    body = `${trainerNoteHtml}<div class="section-body">${groupsHtml}${addGroupBtn}</div>`;
  }

  return `<div class="section" data-sec-idx="${idx}" data-sec-type="${type}">
    <div class="${headerCls}" onclick="toggleSection('${sec.id}')">
      <div class="section-left">
        ${editMode ? `<span class="drag-handle" ontouchstart="startDrag(event,${idx},'${type}')" onmousedown="startDrag(event,${idx},'${type}')">≡</span>` : ''}
        <span class="section-name" ${editMode ? `onclick="event.stopPropagation();openRenameSectionModal('${type}','${sec.id}',${esc(JSON.stringify(sec.name))})" style="cursor:pointer"` : ''}>${sec.name}${editMode ? ' <span style="color:var(--dim);font-size:11px;font-weight:400">✎</span>' : ''}</span>
      </div>
      <div class="section-right">
        ${editMode && sec.custom ? `<button class="delete-btn" onclick="event.stopPropagation();deleteSection('${type}','${sec.id}')">✕</button>` : `<span class="${countCls}">${done}/${total}</span>`}
        <span class="${chevronCls}">▾</span>
      </div>
    </div>
    ${body}
  </div>`;
}

// Global top-of-workout notes (all notes, collapsible)
let trainerNoteOpen = false;
function toggleTrainerNote() { trainerNoteOpen = !trainerNoteOpen; render(); }
function renderTrainerNote() {

function renderSectionTrainerNotes(secId) {

  ).join('');

function renderModal() {
  if (!modal) return '';
  if (modal.type === 'resetStep1') {
    const weekDays  = getWeekDays(currentDate);
    const weekStart = weekDays[0];
    const weekEnd   = weekDays[weekDays.length - 1];
    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `<div class="modal-overlay">
      <div class="modal">
        <h3>↻ Start New Week</h3>
        <p>This will <strong style="color:var(--green)">archive</strong> your workout data for <strong>${fmt(weekStart)} – ${fmt(weekEnd)}</strong>, then clear all checked exercises so you can start fresh.</p>
        <p style="margin-top:8px">Your history will be saved and accessible from the gear menu.</p>
        <div class="modal-actions" style="margin-top:16px">
          <button class="modal-btn cancel"  onclick="closeModal()">Cancel</button>
          <button class="modal-btn confirm" onclick="confirmResetStep2()">Archive &amp; Continue →</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'resetStep2') {
    return `<div class="modal-overlay">
      <div class="modal">
        <h3>Are You Sure?</h3>
        <p>This week's checked exercises will be <strong style="color:var(--accent)">cleared</strong>. Your data has already been archived and will still be viewable in History.</p>
        <div class="modal-actions" style="margin-top:16px">
          <button class="modal-btn cancel"  onclick="confirmReset()">← Go Back</button>

        </div>

    } else {
      body = workoutHistory.map(week => {
        const fmt = ds => { const [y,m,d] = ds.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
        const rows = week.days.map(d => {

      `<div class="sum-row"><span class="sum-name">${s.name}</span><span class="sum-count">${s.done}/${s.total}</span></div>`

    const dateStr = currentDate.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

    const sec = getExercises()[modal.workoutType]?.find(s => s.id === modal.sectionId);

    return `<div class="modal-overlay centered" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>Delete Section</h3>

        <div class="modal-actions" style="margin-top:16px">
          <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
          <button class="modal-btn danger" onclick="doDeleteSection()">Delete</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'confirmDeleteGroup') {
    const sec = getExercises()[modal.workoutType]?.find(s => s.id === modal.sectionId);
    const grp = sec?.groups[modal.groupIdx];
    const name = grp?.name || 'this subheader';
    return `<div class="modal-overlay centered" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>Delete Subheader</h3>
        <p>Delete <strong>${esc(name)}</strong> and all its exercises? This cannot be undone.</p>
        <div class="modal-actions" style="margin-top:16px">
          <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
          <button class="modal-btn danger" onclick="doDeleteGroup()">Delete</button>
        </div>
      </div>
    </div>`;

      </div>`;
    }).join('');

    const selectedCount = allIds.filter(id => sel[id]).length;

    return `<div class="modal-overlay" onclick="closeModal()" style="align-items:flex-end;padding:0">
      <div class="modal builder-modal" onclick="event.stopPropagation()">
        <div class="builder-header">
          <h3>🏗 Workout Builder</h3>
          <div class="builder-day-tabs">${dayTabs}</div>
        </div>
        <div class="builder-body">
          ${sections.length === 0
            ? `<p style="color:var(--dim);font-size:14px;text-align:center;padding:32px 0">Rest day — no exercises to configure.</p>`
            : sectionsHtml}
        </div>
        <div class="builder-footer">
          <button class="builder-select-all" onclick="builderSelectAll('${dk}',[${allIds.map(id=>`'${id}'`).join(',')}])">Select All</button>
          <button class="builder-clear-all" onclick="builderClearAll('${dk}',[${allIds.map(id=>`'${id}'`).join(',')}])">Clear All</button>
          <button class="builder-select-all" style="margin-left:6px" onclick="openBuilderCopyModal()">Copy to →</button>
          <span style="flex:1"></span>
          <span style="font-size:12px;color:var(--dim)">${selectedCount} of ${allIds.length} selected</span>
          <button class="modal-btn confirm" style="margin-left:10px;padding:8px 18px;font-size:13px" onclick="closeModal()">Done</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'builderCopy') {
    const weekDays = getWeekDays(currentDate);
    const srcLabel = DAY_LETTERS[weekDays.findIndex(d => dateKey(d) === modal.srcDay)];
    const otherDays = weekDays.filter(d => dateKey(d) !== modal.srcDay);
    const dayChecks = otherDays.map(d => {
      const k = dateKey(d);
      const letter = DAY_LETTERS[weekDays.indexOf(d)];
      const cfg = schedule[d.getDay()] || makeDayCfg(null);
      const isRest = !cfg.type;
      return `<label style="display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--border);cursor:${isRest?'default':'pointer'};opacity:${isRest?'0.35':'1'}">
        <input type="checkbox" id="copy-day-${k}" value="${k}" ${isRest?'disabled':''} style="width:18px;height:18px;accent-color:var(--accent)">
        <span style="font-size:15px;font-weight:700">${letter}</span>
        <span style="font-size:13px;color:var(--dim)">${cfg.type ? cfg.type.replace('fullBody','Upper Body').replace('legs','Legs') : 'Rest'}</span>
      </label>`;
    }).join('');
    return `<div class="modal-overlay centered" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>Copy ${srcLabel}'s selections to…</h3>
        <p style="font-size:13px;color:var(--dim);margin-bottom:8px">Overwrites the target day's current selections.</p>
        <div style="margin-bottom:16px">${dayChecks}</div>
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="modal={type:'workoutBuilder'};render()">Back</button>
          <button class="modal-btn confirm" onclick="doBuilderCopy([...document.querySelectorAll('[id^=copy-day-]:checked')].map(el=>el.value))">Copy</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'confirmImport') {
    return `<div class="modal-overlay centered" onclick="event.stopPropagation()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>📂 Restore Backup?</h3>
        <p>This will replace <strong>all</strong> current data with the backup from:</p>
        <p style="font-size:15px;font-weight:700;color:var(--accent);margin-bottom:6px">${modal.exportedAt}</p>
        <p style="font-size:13px;color:var(--dim);margin-bottom:20px">Your schedule, history, exercises, and preferences will all be restored. This cannot be undone.</p>
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
          <button class="modal-btn confirm" onclick="doImport()">Restore</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'importError') {
    return `<div class="modal-overlay centered" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>⚠️ Import Failed</h3>
        <p>${modal.message}</p>
        <div class="modal-actions" style="margin-top:16px">
          <button class="modal-btn confirm" onclick="closeModal()">OK</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'add') {
    const groupLabel = modal.groupName || 'section';
    return `<div class="modal-overlay centered" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>Add Exercise</h3>
        <p style="margin-bottom:14px">Adding to: <strong>${esc(groupLabel)}</strong></p>
        <input id="modal-input" class="modal-input" type="text" placeholder="Exercise name">
        <div class="modal-actions">
          <button class="modal-btn cancel"  onclick="closeModal()">Cancel</button>
          <button class="modal-btn confirm" onclick="saveModalEdit()">Add</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

function renderStatsCard() {
  if (statsMode === 'off') return '';
  if (statsMode === 'auto' && !completedDays[dateKey(currentDate)]) return '';
  const weekDays = getWeekDays(currentDate);
  const workoutDays = weekDays.filter(d => getWorkoutType(d));
  const completed = workoutDays.filter(d => completedDays[dateKey(d)]).length;
  let totalDone = 0, daysWithActivity = 0;
  workoutDays.forEach(d => {
    const type = getWorkoutType(d);
    const { done } = getProgress(type, d);
    if (done > 0) { totalDone += done; daysWithActivity++; }
  });
  const avgEx = daysWithActivity ? Math.round(totalDone / daysWithActivity) : 0;
  const streak = getStreak();
  return `<div class="stats-card">
    <div class="stats-cell"><div class="stats-label">This Week</div><div class="stats-value">${completed} / ${workoutDays.length}</div></div>
    <div class="stats-cell"><div class="stats-label">Avg / Day</div><div class="stats-value">${avgEx} <span style="font-size:11px;opacity:0.6">ex</span></div></div>
    <div class="stats-cell"><div class="stats-label">Streak</div><div class="stats-value">🔥 ${streak}</div></div>
  </div>`;
}

let _settingsScroll = 0; // preserve Settings scroll position across renders
function render() {
  // Save settings scroll position before rebuilding DOM
  const _scrollEl = document.querySelector('.sched-modal-body');
  if (_scrollEl) _settingsScroll = _scrollEl.scrollTop;

  const cfg  = getDayCfg(currentDate);
  const type = cfg.type;

  const isDone  = (type || builderMode) ? !!completedDays[dateKey(currentDate)] : false;
  const editBtn = (type || builderMode)
    ? (editMode
        ? `<button class="edit-toggle active" onclick="toggleEditMode()">Done</button>`
        : isDone
          ? `<button class="complete-btn" onclick="showSummary()">✓ Complete</button>`
          : `<button class="finish-btn" onclick="markComplete()">Finish</button>`)
    : '';

  let headerMeta = '';
  if (type || builderMode) {
    const { done, total } = getProgress(type, currentDate);
    const pct   = total ? Math.round((done / total) * 100) : 0;
    const label = builderMode ? 'CUSTOM WORKOUT'
      : type === 'fullBody' ? 'UPPER BODY' : type === 'legs' ? 'LEGS' : type === 'combined' ? 'FULL BODY' : '';
    const days  = builderMode ? 'Workout Builder' : getScheduledDaysLabel(type);
    headerMeta = `
    <div class="workout-meta">
      <div>
        <div class="workout-type">${label}</div>
        <div class="workout-days">${days}</div>
      </div>
      ${editMode ? '' : `<div class="workout-progress">
        <div class="progress-label"><strong>${done}</strong> / ${total} done</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`}
    </div>
    ${editMode
      ? `<div class="expand-btns"><span class="show-hidden-toggle" onclick="toggleShowHidden()">${showHidden ? '🙈 Hide hidden items' : '👁 Show hidden items'}</span></div>`
      : `<div class="expand-btns">
      <button class="expand-btn" onclick="expandAll()">▾ Expand All</button>
      <button class="expand-btn" onclick="collapseAll()">▸ Collapse All</button>
    </div>`}`;
  }

  let content;
  if (type || builderMode) {
    const ex = getExercises();
    const shared = ex['shared'] || [];
    const sharedById = id => shared.filter(s => s.id === id);

    let mainSecs = [];
    if (type === 'combined') mainSecs = [...(ex['fullBody'] || []), ...(ex['legsCore'] || [])];
    else if (type === 'legs') mainSecs = ex['legsCore'] || [];
    else mainSecs = ex[type] || [];

    const dk = dateKey(currentDate);
    const sel = builderMode ? (builderSelections[dk] || {}) : null;

    // In builder mode, draw from ALL sections across all types (schedule is bypassed)
    const allSec = getAllSections();
    const scheduledSections = [
      ...(cfg.warmup ? sharedById('warmup') : []),
      ...mainSecs,
      ...(cfg.cardio ? sharedById('cardio') : []),
      ...(cfg.core   ? sharedById('core')   : []),
      ...(cfg.yoga   ? sharedById('yoga')   : []),
    ];
    const sections = sel ? allSec : scheduledSections;

    const visibleSections = sel
      ? sections.filter(s => s.groups.some(g => g.items.some(item => sel[item.id])))
      : sections;
    content = (visibleSections.length === 0 && builderMode
      ? `<div class="rest-day"><div class="rest-icon">🏗</div><div class="rest-title">No exercises selected</div><div class="rest-sub">Open <button class="rest-settings-link" onclick="openWorkoutBuilder()">Workout Builder</button> to pick your exercises for today.</div></div>`
      : visibleSections.map((s, i) => {
          const sharedIds = ['warmup','cardio','core','yoga'];
          const srcType = sharedIds.includes(s.id) ? 'shared'
            : (ex['legsCore'] || []).some(ls => ls.id === s.id) ? 'legsCore'
            : 'fullBody';
          return renderSection(s, srcType, i);
        }).join('')
    ) + (editMode ? `<button class="add-section-btn" onclick="openAddSectionModal('${type}')">＋ Add Section</button>` : '');
  } else {
    const isToday = dateKey(currentDate) === dateKey(new Date());
    content = `<div class="rest-day">
        <div class="rest-icon">💤</div>
        <div class="rest-title">Rest Day</div>
        ${isToday
          ? `<div class="rest-sub">No workout scheduled for today.<br>Want to work out? Change today's type in <button class="rest-settings-link" onclick="openSettings()">⚙︎ Settings</button></div>`
          : `<div class="rest-sub">No workout scheduled.<br>Tap a day above to review.</div>`
        }
      </div>`;
  }

  const streak = getStreak();
  const streakBadge = '';

  document.getElementById('app').innerHTML = `
    <div class="app-header">
      <div class="app-title-row">
        <div class="app-title">🏋🏽 Workout Log | ${new Date().getFullYear()} ${streakBadge}</div>
        <div class="header-actions">
          <button class="icon-btn" onclick="openSettings()" title="Schedule">⚙︎</button>
          ${editBtn}
        </div>
      </div>
      <div class="week-tabs-wrapper">${renderWeekTabs()}</div>
      ${renderStatsCard()}
      ${headerMeta}
    </div>
    ${renderTrainerNote()}
    ${content}
    <div class="app-footer">
      <button class="reset-btn" onclick="confirmReset()">↻&nbsp; START NEW WEEK</button>
    </div>
    ${renderModal()}
  `;
  // Restore Settings scroll position after DOM rebuild (two rAF frames for full layout)
  if (_settingsScroll > 0) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const _el = document.querySelector('.sched-modal-body');
      if (_el) _el.scrollTop = _settingsScroll;
    }));
  }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

loadState();
currentDate = getDefaultDate();

// Show welcome modal if version changed (first launch or app update)
const lastVer = localStorage.getItem(KEY_VER);
if (lastVer !== APP_VERSION) {
  modal = { type: 'welcome' };
}

render();
</script>
</body>
</html>
