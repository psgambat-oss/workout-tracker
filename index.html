<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="apple-touch-icon" href="icon2.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Log">
  <title>Workout Log</title>
  <style>
    :root {
      --bg:      #0f0f0f;
      --card:    #1c1c1e;
      --card2:   #2c2c2e;
      --accent:  #ff6b00;
      --green:   #30d158;
      --red:     #ff453a;
      --text:    #ffffff;
      --dim:     #8e8e93;
      --border:  #3a3a3c;
      --radius:  12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      min-height: 100vh;
      padding-bottom: 90px;
      overscroll-behavior: none;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--card);
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ── WEEK TABS ── */
    .week-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .day-tab {
      flex: 1;
      padding: 4px 4px;
      border: none;
      border-radius: 8px;
      background: var(--card2);
      color: var(--dim);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-height: 44px;
      justify-content: center;
    }

    .day-tab .day-letter { font-size: 14px; font-weight: 800; }
    .day-tab .day-num   { font-size: 11px; }
    .day-tab .day-dot   { width: 5px; height: 5px; border-radius: 50%; background: transparent; }

    .day-tab.active          { background: var(--accent); color: #fff; }
    .day-tab.has-progress .day-dot { background: var(--green); }
    .day-tab.active .day-dot { background: rgba(255,255,255,0.5); }
    .day-tab.weekend         { background: #1a1a1a; color: #555; border: 1px solid #2a2a2a; }
    .day-tab.weekend.active  { background: var(--accent); color: #fff; border-color: transparent; }
    .day-tab.weekend.has-progress .day-dot { background: var(--green); }

    /* ── WORKOUT META ── */
    .workout-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 32px;
    }

    .workout-type  { font-size: 17px; font-weight: 800; letter-spacing: 0.3px; }
    .workout-days  { font-size: 11px; color: var(--dim); font-weight: 600; letter-spacing: 1px; }

    .expand-btns { display: flex; gap: 6px; margin-top: 6px; }
    .expand-btn {
      flex: 1;
      padding: 4px;
      border: none;
      border-radius: 8px;
      background: var(--card2);
      color: var(--dim);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .expand-btn:active { background: var(--border); }

    .workout-progress { text-align: right; }
    .progress-label   { font-size: 13px; color: var(--dim); }
    .progress-label strong { color: var(--green); }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 5px;
      width: 80px;
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ── SECTIONS ── */
    .section { margin: 6px 12px 0; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--card2);
      border-radius: var(--radius);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: border-radius 0.1s;
    }

    .section-header.open { border-radius: var(--radius) var(--radius) 0 0; }

    .section-left  { display: flex; align-items: center; gap: 10px; }
    .section-icon  { font-size: 18px; }
    .section-name  { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; }
    .section-right { display: flex; align-items: center; gap: 10px; }

    .section-count              { font-size: 13px; color: var(--dim); font-weight: 600; }
    .section-count.has-progress { color: var(--green); }
    .section-count.complete     { color: var(--green); }

    .chevron      { color: var(--dim); font-size: 13px; transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    /* right-arm note */
    .tnote {
      margin: 0 0 12px 0;
      border-radius: 12px;
      background: var(--card);
      overflow: hidden;
      border: 1px solid var(--card2);
    }
    .tnote-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 12px; font-size: 12px; font-weight: 700;
      color: var(--dim); cursor: pointer;
    }
    .tnote-chevron { font-size: 12px; }
    .tnote-body {
      padding: 0 16px 14px;
      font-size: 13px; color: var(--text); line-height: 1.6;
    }
    .tnote-body p { margin: 0 0 8px; }
    .tnote-body p:last-child { margin-bottom: 0; }

    .section-note {
      background: rgba(48,209,88,0.08);
      border: 1px solid rgba(48,209,88,0.2);
      border-top: none;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
    }

    /* section body */
    .section-body {
      background: var(--card);
      border-radius: 0 0 var(--radius) var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      border-top: none;
    }

    .group-label {
      padding: 10px 14px 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--dim);
      text-transform: uppercase;
      border-top: 1px solid var(--border);
    }

    .group-label:first-child { border-top: none; }

    /* ── EXERCISE ROW ── */
    .exercise-item {
      display: flex;
      align-items: center;
      padding: 9px 14px;
      gap: 10px;
      min-height: 40px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .exercise-item:active { background: rgba(255,255,255,0.05); }

    .exercise-item.checked .exercise-label {
      color: var(--dim);
      text-decoration: line-through;
    }

    .checkbox {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .exercise-item.checked .checkbox {
      background: var(--green);
      border-color: var(--green);
    }

    .checkmark { display: none; color: #fff; font-size: 14px; font-weight: 700; }
    .exercise-item.checked .checkmark { display: block; }

    .exercise-label { font-size: 15px; flex: 1; line-height: 1.3; }

    /* ── DAY BADGES ── */
    .day-badges { display: flex; gap: 3px; flex-shrink: 0; }

    .day-badge {
      font-size: 10px;
      font-weight: 800;
      color: var(--green);
      background: rgba(48, 209, 88, 0.15);
      border: 1px solid rgba(48, 209, 88, 0.25);
      border-radius: 4px;
      padding: 2px 5px;
      letter-spacing: 0.3px;
    }

    /* ── TIME CONTROLS (cardio) ── */
    .time-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .time-btn {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: none;
      background: var(--card2);
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .time-display {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      min-width: 38px;
      text-align: center;
    }

    /* ── REST DAY ── */
    .rest-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 14px;
      text-align: center;
    }

    .rest-day .rest-icon  { font-size: 60px; }
    .rest-day .rest-title { font-size: 22px; font-weight: 800; }
    .rest-day .rest-sub   { font-size: 15px; color: var(--dim); line-height: 1.5; }

    /* ── FOOTER ── */
    .app-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 8px 16px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      background: var(--card);
      border-top: 1px solid var(--border);
    }

    .reset-btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 10px;
      background: rgba(255,107,0,0.15);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    .reset-btn:active { background: rgba(255,69,58,0.25); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    .modal {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
    }

    .modal h3  { font-size: 19px; font-weight: 800; margin-bottom: 8px; }
    .modal p   { font-size: 15px; color: var(--dim); margin-bottom: 22px; line-height: 1.5; }

    .modal-actions { display: flex; gap: 10px; }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .modal-btn.cancel  { background: var(--card2); color: var(--text); }
    .modal-btn.confirm { background: var(--accent); color: #fff; }
    .modal-btn.danger  { background: rgba(255,69,58,0.15); color: var(--red); }

    .modal-input {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card2);
      color: var(--text);
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
      font-family: inherit;
    }
    .modal-input:focus { border-color: var(--accent); }

    /* ── EDIT MODE ── */
    .app-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      padding: 6px 10px;
      border: none;
      border-radius: 8px;
      background: var(--card2);
      color: var(--dim);
      font-size: 16px;
      cursor: pointer;
    }
    .edit-toggle {
      padding: 6px 16px;
      border: none;
      border-radius: 8px;
      background: var(--card2);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .edit-toggle.active { background: var(--accent); color: #fff; }
    .complete-btn, .finish-btn {
      padding: 6px 14px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      min-height: 44px; min-width: 100px;
      display: flex; align-items: center; justify-content: center;
    }
    .complete-btn { background: rgba(48,209,88,0.15);  color: var(--green);  }
    .finish-btn   { background: rgba(255,107,0,0.15);  color: var(--accent); }
    .sum-header { margin-bottom: 12px; }
    .sum-title { font-size: 18px; font-weight: 800; color: var(--green); }
    .sum-date { font-size: 12px; color: var(--dim); margin-top: 2px; }
    .sum-stat { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
    .sum-sections { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .sum-row { display: flex; justify-content: space-between; font-size: 13px; }
    .sum-name { color: var(--text); font-weight: 600; }
    .sum-count { color: var(--green); font-weight: 700; }
    .sum-kudos { font-size: 13px; color: var(--dim); font-style: italic; margin-bottom: 16px; line-height: 1.5; }

    .drag-handle {
      color: var(--dim); font-size: 20px; padding-right: 10px;
      cursor: grab; touch-action: none; user-select: none; flex-shrink: 0;
    }
    .section.dragging { opacity: 0.35; }
    .section.drag-over { outline: 2px solid var(--accent); border-radius: 12px; }
    .add-section-btn {
      width: 100%; padding: 11px; margin-top: 8px;
      border: 1.5px dashed var(--card2); border-radius: 12px;
      background: transparent; color: var(--dim);
      font-size: 14px; font-weight: 700; cursor: pointer;
    }

    .streak-badge { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0; margin-left: 6px; }
    .stats-card { display:flex; margin: 8px 0 2px; background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    .stats-cell { flex: 1; padding: 7px 4px; text-align: center; }
    .stats-cell + .stats-cell { border-left: 1px solid var(--border); }
    .stats-label { font-size: 9px; color: var(--dim); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .stats-value { font-size: 14px; font-weight: 800; color: var(--text); margin-top: 1px; }
    .sched-modal { max-height: 85vh; overflow-y: auto; }
    .hist-modal  { max-height: 85vh; overflow-y: auto; }
    .hist-list   { display: flex; flex-direction: column; gap: 16px; }
    .hist-week   { background: var(--card2); border-radius: 10px; padding: 10px 12px; }
    .hist-week-hdr { font-size: 12px; font-weight: 800; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .hist-row    { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 4px 0; border-top: 1px solid var(--border); }
    .hist-date   { color: var(--dim); font-weight: 600; min-width: 52px; }
    .hist-type   { color: var(--text); font-weight: 600; flex: 1; }
    .hist-stat   { color: var(--green); font-weight: 700; }
    .settings-section { margin-bottom: 16px; }
    .settings-section-hdr { font-size: 10px; font-weight: 700; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .sched-list { display: flex; flex-direction: column; gap: 8px; }
    .sched-row { display: flex; align-items: center; gap: 8px; }
    .sched-day { width: 32px; font-weight: 700; font-size: 13px; color: var(--text); flex-shrink: 0; }
    .sched-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; flex: 1; }
    .sched-btn {
      padding: 5px 4px; border: 1.5px solid var(--card2); border-radius: 7px;
      background: transparent; color: var(--dim); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center;
    }
    .sched-btn.sel { border-color: var(--accent); color: var(--accent); background: rgba(255,107,0,0.1); }
    .settings-seg { display:flex; background:var(--card2); border-radius:8px; overflow:hidden; border:1px solid var(--border); }
    .settings-seg span { flex:1; padding:8px 4px; text-align:center; font-size:12px; font-weight:700; cursor:pointer; }
    .settings-seg span + span { border-left:1px solid var(--border); }
    .settings-tools { display:flex; gap:8px; }
    .settings-tools button { flex:1; }

    .delete-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: none;
      background: var(--red);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1;
    }

    .add-exercise-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 14px;
      border: none;
      background: transparent;
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      text-align: left;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .add-exercise-btn:active { background: rgba(255,107,0,0.08); }
  </style>
</head>
<body>
<div id="app"></div>

const KEY       = 'wl26';
const KEY_COL   = 'wl26_col';
const KEY_EX    = 'wl26_ex';
const KEY_SCHED  = 'wl26_sched';
const KEY_DONE   = 'wl26_done';
const KEY_HIST   = 'wl26_history';
const KEY_PREFS  = 'wl26_prefs';

// 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
const DEFAULT_SCHEDULE = { 0: null, 1: 'fullBody', 2: 'legsCore', 3: 'fullBody', 4: 'legsCore', 5: 'fullBody', 6: null };

let statsMode        = 'off'; // 'off' | 'auto' | 'always'
let schedule         = Object.assign({}, DEFAULT_SCHEDULE);
let state            = {};
let collapsed        = {};
let customExercises  = null;
let editMode         = false;
let modal            = null;
let completedDays    = {};
let workoutHistory   = [];

function loadSchedule() {
  try { const r = localStorage.getItem(KEY_SCHED); if (r) schedule = JSON.parse(r); } catch(e) {}
}
function saveSchedule()      { localStorage.setItem(KEY_SCHED, JSON.stringify(schedule)); }
function saveHistory()       { localStorage.setItem(KEY_HIST,  JSON.stringify(workoutHistory)); }
function savePrefs()         { localStorage.setItem(KEY_PREFS, JSON.stringify({ statsMode })); }
function setStatsMode(mode)  { statsMode = mode; savePrefs(); render(); }

function getDefaultDate() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d;
}

let currentDate = getDefaultDate();

function loadState() {
  loadSchedule();
  try { state           = JSON.parse(localStorage.getItem(KEY))      || {}; } catch(e) { state = {}; }
  try { collapsed       = JSON.parse(localStorage.getItem(KEY_COL))  || {}; } catch(e) { collapsed = {}; }
  try { completedDays   = JSON.parse(localStorage.getItem(KEY_DONE)) || {}; } catch(e) { completedDays = {}; }
  try { workoutHistory  = JSON.parse(localStorage.getItem(KEY_HIST)) || []; } catch(e) { workoutHistory = []; }
  try { const p = localStorage.getItem(KEY_PREFS); if (p) { const prefs = JSON.parse(p); statsMode = prefs.statsMode || 'off'; } } catch(e) {}
  try { const r = localStorage.getItem(KEY_EX); if (r) customExercises = JSON.parse(r); } catch(e) {}
}

function saveState()          { localStorage.setItem(KEY,      JSON.stringify(state)); }
function saveCollapsed()      { localStorage.setItem(KEY_COL,  JSON.stringify(collapsed)); }
function saveCustomExercises(){ localStorage.setItem(KEY_EX,   JSON.stringify(customExercises)); }
function saveCompletedDays()  { localStorage.setItem(KEY_DONE, JSON.stringify(completedDays)); }

function getExercises() { return customExercises || EXERCISES; }

function ensureCustomExercises() {
  if (!customExercises) customExercises = JSON.parse(JSON.stringify(EXERCISES));
}

function dateKey(d) { return d.toISOString().slice(0, 10); }

function getDayState(d) {
  const k = dateKey(d);
  if (!state[k]) state[k] = { checked: {}, times: {} };
  if (!state[k].times) state[k].times = {};
  return state[k];
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────

function getMonday(d) {
  const date = new Date(d);
  const day  = date.getDay();
  date.setDate(date.getDate() + (day === 0 ? -6 : 1 - day));
  date.setHours(0, 0, 0, 0);
  return date;
}

function getWeekDays(d) {
  const mon = getMonday(d);
  return Array.from({ length: 7 }, (_, i) => {
    const day = new Date(mon);
    day.setDate(day.getDate() + i);
    return day;
  });
}

function getWorkoutType(d) {
  return schedule[d.getDay()] || null;
}

const DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
function getScheduledDaysLabel(type) {
  return Object.entries(schedule)
    .filter(([,v]) => v === type)
    .map(([k]) => DAY_NAMES[+k])
    .join(' · ');
}

function hasAnyProgress(d) {
  const ds = getDayState(d);
  return Object.values(ds.checked || {}).some(Boolean);
}

function getProgress(type, d) {
  const ds    = getDayState(d);
  const types = type === 'combined' ? ['fullBody', 'legsCore'] : [type];
  let total = 0, done = 0;
  types.forEach(t =>
    getExercises()[t].forEach(sec =>
      sec.groups.forEach(g =>
        g.items.forEach(item => { total++; if (ds.checked[item.id]) done++; })
      )
    )
  );
  return { done, total };
}

function getSectionProgress(secId, type, d) {
  const ds    = getDayState(d);
  const types = type === 'combined' ? ['fullBody', 'legsCore'] : [type];
  let sec = null;
  for (const t of types) { sec = getExercises()[t].find(s => s.id === secId); if (sec) break; }
  if (!sec) return { done: 0, total: 0 };
  let total = 0, done = 0;
  sec.groups.forEach(g =>
    g.items.forEach(item => { total++; if (ds.checked[item.id]) done++; })
  );
  return { done, total };
}

function getStreak() {
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(today);
  for (let i = 0; i < 365; i++) {
    const dk   = dateKey(d);
    const type = getWorkoutType(d);
    if (type) {
      if (completedDays[dk]) {
        streak++;
      } else if (dk !== dateKey(today)) {
        break;
      }
    }
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function toggleExercise(id) {
  const ds = getDayState(currentDate);
  if (ds.checked[id]) { delete ds.checked[id]; delete ds.times[id]; }
  else { ds.checked[id] = true; }
  saveState();
  render();
}

function adjustTime(id, delta) {
  const ds = getDayState(currentDate);
  const cur = ds.times[id] || 0;
  ds.times[id] = Math.max(0, Math.min(120, cur + delta));
  saveState();
  const el = document.querySelector(`[data-time="${id}"]`);
  if (el) el.textContent = ds.times[id] > 0 ? ds.times[id] + 'm' : '—';
}

function switchDay(iso) {

function toggleSection(id) {
  const isCollapsed = collapsed[id] !== false;

function expandAll() {

}

    if (sec) {
      sec.groups.forEach(g => {
        const item = g.items.find(i => i.id === modal.id);
        if (item) item.label = val;
      });
      saveCustomExercises();
    }
  } else if (modal.type === 'add') {
    ensureCustomExercises();
    const sec = customExercises[modal.workoutType].find(s => s.id === modal.sectionId);
    if (sec) {
      const group = sec.groups.find(g => g.name === modal.groupName);
      if (group) group.items.push({ id: 'u' + Date.now(), label: val });
      saveCustomExercises();

  render();
}

// ── DRAG-TO-REORDER SECTIONS ──────────────────
let drag = null;
function startDrag(e, idx, type) {
  e.preventDefault(); e.stopPropagation();
  drag = { srcIdx: idx, type, overIdx: idx };
  document.querySelector(`[data-sec-idx="${idx}"]`)?.classList.add('dragging');
}
function _dragMove(clientY) {
  if (!drag) return;
  const sections = [...document.querySelectorAll('[data-sec-idx]')];
  let overIdx = drag.srcIdx;
  sections.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (clientY > rect.top + rect.height / 2) overIdx = parseInt(el.dataset.secIdx);
  });
  if (overIdx !== drag.overIdx) {
    sections.forEach(el => el.classList.remove('drag-over'));
    document.querySelector(`[data-sec-idx="${overIdx}"]`)?.classList.add('drag-over');
    drag.overIdx = overIdx;
  }
}
function _dragEnd(clientY) {
  if (!drag) return;
  const { srcIdx, type, overIdx } = drag;
  drag = null;
  if (overIdx !== srcIdx) {
    ensureCustomExercises();
    const arr = customExercises[type];
    const [removed] = arr.splice(srcIdx, 1);
    arr.splice(overIdx, 0, removed);
    saveCustomExercises();
  }
  render();
}
document.addEventListener('touchmove', e => { if (drag) { e.preventDefault(); _dragMove(e.touches[0].clientY); } }, { passive: false });
document.addEventListener('touchend',  e => { if (drag) _dragEnd(e.changedTouches[0].clientY); });
document.addEventListener('mousemove', e => { if (drag) _dragMove(e.clientY); });
document.addEventListener('mouseup',   e => { if (drag) _dragEnd(e.clientY); });

function openSettings() { modal = { type: 'schedule', draft: Object.assign({}, schedule) }; render(); }
function openEditFromSettings() { modal = null; editMode = true; render(); }

const KUDOS = [
  "Beast mode. You showed up and put in the work.",
  "Another day, another win. Keep stacking them.",
  "That's what dedication looks like. Well done.",
  "You came, you lifted, you crushed it.",
  "One more session in the books. Keep going.",
  "Consistency is the game — you're playing it right.",
  "Strong work today. Your future self thanks you."
];

function markComplete() {
  completedDays[dateKey(currentDate)] = true;
  saveCompletedDays();
  showSummary();
}

function showSummary() {
  const type = getWorkoutType(currentDate);
  if (!type) return;
  const ds = getDayState(currentDate);
  const exercises = getExercises();
  const types = type === 'combined' ? ['fullBody', 'legsCore'] : [type];
  let totalDone = 0, totalAll = 0;
  const sectionSummaries = [];
  types.forEach(t => exercises[t].forEach(sec => {
    let secDone = 0, secTotal = 0;
    sec.groups.forEach(g => g.items.forEach(item => {
      secTotal++;
      if (ds.checked[item.id]) { secDone++; totalDone++; }
      totalAll++;
    }));
    if (secDone > 0) sectionSummaries.push({ name: sec.name, done: secDone, total: secTotal });
  }));
  const kudos = KUDOS[Math.floor(Math.random() * KUDOS.length)];
  modal = { type: 'summary', totalDone, totalAll, sectionSummaries, kudos };
  render();
}
function setSchedDay(i, val) { modal.draft[i] = val; render(); }
function saveSettings() {
  schedule = Object.assign({}, modal.draft);
  saveSchedule();
  modal = null;
  currentDate = getDefaultDate();
  render();
}

function doReset() {
  const weekDays  = getWeekDays(currentDate);
  const weekStart = dateKey(weekDays[0]);
  const weekEnd   = dateKey(weekDays[weekDays.length - 1]);
  const exercises = getExercises();

  // Build per-day summary for archive
  const days = weekDays.map(d => {
    const dk   = dateKey(d);
    const type = getWorkoutType(d);
    if (!type) return null;
    let done = 0, total = 0;
    const types = type === 'combined' ? ['fullBody', 'legsCore'] : [type];
    types.forEach(t => exercises[t].forEach(sec =>
      sec.groups.forEach(g => g.items.forEach(item => {
        total++;
        if (state[dk]?.checked?.[item.id]) done++;
      }))
    ));
    if (total === 0) return null;
    return { date: dk, type, done, total, completed: !!completedDays[dk] };
  }).filter(Boolean);

  if (days.length > 0) {
    workoutHistory.unshift({ weekStart, weekEnd, days });
    saveHistory();
  }

  weekDays.forEach(d => {
    delete state[dateKey(d)];
    delete completedDays[dateKey(d)];
  });
  saveState();
  saveCompletedDays();
  modal = null;
  render();
}

function openHistory() { modal = { type: 'history' }; render(); }

const DAY_LETTERS = ['M','T','W','T','F','S','S'];

function renderWeekTabs() {
  return getWeekDays(currentDate).map((d, i) => {
    const active      = dateKey(d) === dateKey(currentDate);
    const hasProgress = hasAnyProgress(d);
    const isWeekend   = d.getDay() === 6 || d.getDay() === 0;
    const cls = ['day-tab', isWeekend ? 'weekend' : '', active ? 'active' : '', (!active && hasProgress) ? 'has-progress' : '']
      .filter(Boolean).join(' ');
    return `<button class="${cls}" onclick="switchDay('${dateKey(d)}')">
      <span class="day-letter">${DAY_LETTERS[i]}</span>
      <span class="day-num">${d.getDate()}</span>
      <span class="day-dot"></span>
    </button>`;
  }).join('');
}

function renderExercise(item, ds, workoutType, sectionId) {
  if (editMode) {
    return `<div class="exercise-item" style="cursor:default">
      <button class="delete-btn" onclick="deleteExerciseDirect('${item.id}','${workoutType}','${sectionId}')">✕</button>
      <span class="exercise-label" style="cursor:pointer" onclick="openEditModal('${item.id}','${workoutType}','${sectionId}','${esc(item.label)}')">${esc(item.label)}</span>
      <span style="color:var(--dim);font-size:13px;flex-shrink:0" onclick="openEditModal('${item.id}','${workoutType}','${sectionId}','${esc(item.label)}')">✎</span>
    </div>`;
  }

  const checked = !!ds.checked[item.id];
  const time    = ds.times[item.id] || 0;

  const doneDays = getWeekDays(currentDate).filter(d => {
    if (dateKey(d) === dateKey(currentDate)) return false;
    return !!state[dateKey(d)]?.checked?.[item.id];
  });
  const badgesHtml = doneDays.length
    ? `<div class="day-badges">${doneDays.map(d => `<span class="day-badge">${['S','M','T','W','T','F','S'][d.getDay()]}</span>`).join('')}</div>`
    : '';

  let timeHtml = '';
  if (item.timed && checked) {
    timeHtml = `<div class="time-controls" onclick="event.stopPropagation()">
      <button class="time-btn" onclick="adjustTime('${item.id}',-5)">−</button>
      <span class="time-display" data-time="${item.id}">${time > 0 ? time + 'm' : '—'}</span>
      <button class="time-btn" onclick="adjustTime('${item.id}',5)">+</button>
    </div>`;
  }

  return `<div class="exercise-item${checked ? ' checked' : ''}" onclick="toggleExercise('${item.id}')">
    <div class="checkbox"><span class="checkmark">✓</span></div>
    <span class="exercise-label">${esc(item.label)}</span>
    ${badgesHtml}
    ${timeHtml}
  </div>`;
}

function renderSection(sec, type, idx) {
  const ds          = getDayState(currentDate);
  const isCollapsed = collapsed[sec.id] !== false;
  const { done, total } = getSectionProgress(sec.id, type, currentDate);
  const complete    = done === total && total > 0;

  const headerCls  = `section-header${isCollapsed ? '' : ' open'}`;
  const countCls   = `section-count${complete ? ' complete' : (done > 0 ? ' has-progress' : '')}`;
  const chevronCls = `chevron${isCollapsed ? '' : ' open'}`;

  let body = '';
  if (!isCollapsed) {
    const noteHtml = sec.rightArm
      ? `<div class="section-note">⚡ Add extra unilateral set — right side (Jim Delgado)</div>`
      : '';
    const groupsHtml = sec.groups.map(g => {
      const label   = g.name ? `<div class="group-label">${g.name}</div>` : '';
      const items   = g.items.map(item => renderExercise(item, ds, type, sec.id)).join('');
      const addBtn  = editMode
        ? `<button class="add-exercise-btn" onclick="openAddModal('${type}','${sec.id}',${JSON.stringify(g.name)})">＋ Add to ${g.name || sec.name}</button>`
        : '';
      return label + items + addBtn;
    }).join('');
    body = `${noteHtml}<div class="section-body">${groupsHtml}</div>`;
  }

  return `<div class="section" data-sec-idx="${idx}" data-sec-type="${type}">
    <div class="${headerCls}" onclick="toggleSection('${sec.id}')">
      <div class="section-left">
        ${editMode ? `<span class="drag-handle" ontouchstart="startDrag(event,${idx},'${type}')" onmousedown="startDrag(event,${idx},'${type}')">≡</span>` : ''}
        <span class="section-name">${sec.name}</span>
      </div>
      <div class="section-right">
        ${editMode ? '' : `<span class="${countCls}">${done}/${total}</span>`}
        <span class="${chevronCls}">▾</span>
      </div>
    </div>
    ${body}
  </div>`;
}

let trainerNoteOpen = false;
function toggleTrainerNote() { trainerNoteOpen = !trainerNoteOpen; render(); }
function renderTrainerNote() {
  const body = trainerNoteOpen ? `
    <div class="tnote-body">
      <p><strong style="color:var(--green)">WORKOUT ADJUSTMENT</strong> <span style="color:var(--text);font-weight:normal;font-size:0.9em">(SAT APR 4 2026)</span><br>
      Jim Delgado, CKTP, CMCE | Exercise Physiologist</p>
      <p><strong style="color:var(--green)">RIGHT ARM</strong><span style="color:var(--green);font-weight:normal"> (extra right arm set):</span> Add a few extra unilateral sets on the right side each session.</p>
      <p><strong style="color:var(--green)">LEGS</strong><span style="color:var(--green);font-weight:normal"> (2 Leg Days):</span> Two dedicated leg/core days. Only do treadmill cardio for a few minutes to stretch out before and after.</p>
    </div>` : '';
  return `<div class="tnote">
    <div class="tnote-header" onclick="toggleTrainerNote()">
      <span>📋 Trainer Notes</span>
      <span class="tnote-chevron">${trainerNoteOpen ? '▾' : '▸'}</span>
    </div>
    ${body}
  </div>`;
}

function renderModal() {
  if (!modal) return '';
  if (modal.type === 'resetStep1') {
    const weekDays  = getWeekDays(currentDate);
    const weekStart = weekDays[0];
    const weekEnd   = weekDays[weekDays.length - 1];
    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `<div class="modal-overlay">
      <div class="modal">
        <h3>↻ Start New Week</h3>
        <p>This will <strong style="color:var(--green)">archive</strong> your workout data for <strong>${fmt(weekStart)} – ${fmt(weekEnd)}</strong>, then clear all checked exercises so you can start fresh.</p>
        <p style="margin-top:8px">Your history will be saved and accessible from the gear menu.</p>
        <div class="modal-actions" style="margin-top:16px">
          <button class="modal-btn cancel"  onclick="closeModal()">Cancel</button>
          <button class="modal-btn confirm" onclick="confirmResetStep2()">Archive &amp; Continue →</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'resetStep2') {
    return `<div class="modal-overlay">
      <div class="modal">
        <h3>Are You Sure?</h3>
        <p>This week's checked exercises will be <strong style="color:var(--accent)">cleared</strong>. Your data has already been archived and will still be viewable in History.</p>
        <div class="modal-actions" style="margin-top:16px">
          <button class="modal-btn cancel"  onclick="confirmReset()">← Go Back</button>
          <button class="modal-btn danger"  onclick="doReset()">Archive &amp; Start Fresh</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'history') {
    let body = '';
    if (workoutHistory.length === 0) {
      body = `<p style="color:var(--dim);text-align:center;padding:20px 0">No archived weeks yet.<br>Hit <strong>↻ Start New Week</strong> to save your first week.</p>`;
    } else {
      body = workoutHistory.map(week => {
        const fmt = ds => { const [y,m,d] = ds.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
        const rows = week.days.map(d => {
          const label = d.type === 'fullBody' ? 'Upper Body' : d.type === 'combined' ? 'Full Body' : 'Legs & Core';
          const pct   = d.total ? Math.round((d.done / d.total) * 100) : 0;
          const tick  = d.completed ? `<span style="color:var(--green)">☑</span>` : `<span style="color:var(--dim)">☐</span>`;
          return `<div class="hist-row">
            <span class="hist-date">${fmt(d.date)}</span>
            <span class="hist-type">${label}</span>
            <span class="hist-stat">${d.done}/${d.total} <span style="color:var(--dim);font-weight:400">(${pct}%)</span></span>
            ${tick}
          </div>`;
        }).join('');
        return `<div class="hist-week">
          <div class="hist-week-hdr">${fmt(week.weekStart)} – ${fmt(week.weekEnd)}</div>
          ${rows}
        </div>`;
      }).join('');
    }
    return `<div class="modal-overlay" onclick="closeModal()">
      <div class="modal hist-modal" onclick="event.stopPropagation()">
        <h3>📋 Workout History</h3>
        <div class="hist-list">${body}</div>
        <div class="modal-actions" style="margin-top:16px">
          <button class="modal-btn confirm" onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'editEx') {
    return `<div class="modal-overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>Edit Exercise</h3>
        <input id="modal-input" class="modal-input" type="text" value="${esc(modal.label)}" placeholder="Exercise name">
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
          <button class="modal-btn confirm" onclick="saveModalEdit()">Save</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'summary') {
    const { totalDone, totalAll, sectionSummaries, kudos } = modal;
    const pct = totalAll ? Math.round((totalDone / totalAll) * 100) : 0;
    const rows = sectionSummaries.map(s =>
      `<div class="sum-row"><span class="sum-name">${s.name}</span><span class="sum-count">${s.done}/${s.total}</span></div>`
    ).join('');
    const dateStr = currentDate.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    return `<div class="modal-overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="sum-header">
          <div class="sum-title">Workout Complete</div>
          <div class="sum-date">${dateStr}</div>
        </div>
        <div class="sum-stat">${totalDone} / ${totalAll} exercises &nbsp;·&nbsp; ${pct}%</div>
        <div class="sum-sections">${rows || '<div style="color:var(--dim);font-size:13px">No exercises logged yet.</div>'}</div>
        <div class="sum-kudos">${kudos}</div>
        <div class="modal-actions">
          <button class="modal-btn confirm" onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'addSection') {
    return `<div class="modal-overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>Add Section</h3>
        <input id="modal-input" class="modal-input" type="text" placeholder="Section name (e.g. CALVES)">
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
          <button class="modal-btn confirm" onclick="saveNewSection()">Add</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'schedule') {
    const days = [['Mon',1],['Tue',2],['Wed',3],['Thu',4],['Fri',5],['Sat',6],['Sun',0]];
    const rows = days.map(([name, i]) => {
      const cur = modal.draft[i];
      return `<div class="sched-row">
        <span class="sched-day">${name}</span>
        <div class="sched-opts">
          <button class="sched-btn${cur==='fullBody'?' sel':''}" onclick="setSchedDay(${i},'fullBody')">Upper Body</button>
          <button class="sched-btn${cur==='legsCore'?' sel':''}" onclick="setSchedDay(${i},'legsCore')">Legs &amp; Core</button>
          <button class="sched-btn${cur==='combined'?' sel':''}" onclick="setSchedDay(${i},'combined')">Full Body</button>
          <button class="sched-btn${cur===null?' sel':''}" onclick="setSchedDay(${i},null)">Rest</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="modal-overlay" onclick="closeModal()">
      <div class="modal sched-modal" onclick="event.stopPropagation()">
        <h3>⚙︎ Settings</h3>

        <div class="settings-section">
          <div class="settings-section-hdr">📅 Workout Schedule</div>
          <div class="sched-list">${rows}</div>
        </div>

        <div class="settings-section">
          <div class="settings-section-hdr">📊 Weekly Stats</div>
          <div class="settings-seg">
            <span onclick="setStatsMode('off')" style="${statsMode==='off'?'background:rgba(255,107,0,0.2);color:var(--accent)':'color:var(--dim)'}">Off</span>
            <span onclick="setStatsMode('auto')" style="${statsMode==='auto'?'background:rgba(48,209,88,0.15);color:var(--green)':'color:var(--dim)'}">After Finish</span>
            <span onclick="setStatsMode('always')" style="${statsMode==='always'?'background:rgba(48,209,88,0.15);color:var(--green)':'color:var(--dim)'}">Always</span>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-hdr">🛠 Tools</div>
          <div class="settings-tools">
            <button class="modal-btn cancel" onclick="openEditFromSettings()">✎ Edit Exercises</button>
            <button class="modal-btn cancel" onclick="openHistory()">📋 History</button>
          </div>
        </div>

        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
          <button class="modal-btn confirm" onclick="saveSettings()">Save</button>
        </div>
      </div>
    </div>`;
  }
  if (modal.type === 'add') {
    const groupLabel = modal.groupName || 'section';
    return `<div class="modal-overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>Add Exercise</h3>
        <p style="margin-bottom:14px">Adding to: <strong>${esc(groupLabel)}</strong></p>
        <input id="modal-input" class="modal-input" type="text" placeholder="Exercise name">
        <div class="modal-actions">
          <button class="modal-btn cancel"  onclick="closeModal()">Cancel</button>
          <button class="modal-btn confirm" onclick="saveModalEdit()">Add</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

function renderStatsCard() {
  if (statsMode === 'off') return '';
  if (statsMode === 'auto' && !completedDays[dateKey(currentDate)]) return '';
  const weekDays = getWeekDays(currentDate);
  const workoutDays = weekDays.filter(d => getWorkoutType(d));
  const completed = workoutDays.filter(d => completedDays[dateKey(d)]).length;
  let totalPct = 0, pctCount = 0;
  workoutDays.forEach(d => {
    const type = getWorkoutType(d);
    const { done, total } = getProgress(type, d);
    if (total > 0) { totalPct += Math.round((done / total) * 100); pctCount++; }
  });
  const avg = pctCount ? Math.round(totalPct / pctCount) : 0;
  const streak = getStreak();
  return `<div class="stats-card">
    <div class="stats-cell"><div class="stats-label">This Week</div><div class="stats-value">${completed} / ${workoutDays.length}</div></div>
    <div class="stats-cell"><div class="stats-label">Avg Done</div><div class="stats-value">${avg}%</div></div>
    <div class="stats-cell"><div class="stats-label">Streak</div><div class="stats-value">🔥 ${streak}</div></div>
  </div>`;
}

function render() {
  const type = getWorkoutType(currentDate);

  const isDone  = type ? !!completedDays[dateKey(currentDate)] : false;
  const editBtn = type
    ? (editMode
        ? `<button class="edit-toggle active" onclick="toggleEditMode()">Done</button>`
        : isDone
          ? `<button class="complete-btn" onclick="showSummary()">✓ Complete</button>`
          : `<button class="finish-btn" onclick="markComplete()">☐ Finish</button>`)
    : '';

  let headerMeta = '';
  if (type) {
    const { done, total } = getProgress(type, currentDate);
    const pct   = total ? Math.round((done / total) * 100) : 0;
    const label = type === 'fullBody' ? 'UPPER BODY' : type === 'combined' ? 'FULL BODY' : 'LEGS & CORE';
    const days  = getScheduledDaysLabel(type);
    headerMeta = `
    <div class="workout-meta">
      <div>
        <div class="workout-type">${label}</div>
        <div class="workout-days">${days}</div>
      </div>
      ${editMode ? '' : `<div class="workout-progress">
        <div class="progress-label"><strong>${done}</strong> / ${total} done</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`}
    </div>
    ${editMode ? '' : `<div class="expand-btns">
      <button class="expand-btn" onclick="expandAll()">▾ Expand All</button>
      <button class="expand-btn" onclick="collapseAll()">▸ Collapse All</button>
    </div>`}`;
  }

  let content;
  if (type === 'combined') {
    content = [
      ...getExercises()['fullBody'].map((s, i) => renderSection(s, 'fullBody', i)),
      ...getExercises()['legsCore'].map((s, i) => renderSection(s, 'legsCore', i))
    ].join('');
  } else if (type) {
    content = getExercises()[type].map((s, i) => renderSection(s, type, i)).join('') +
      (editMode ? `<button class="add-section-btn" onclick="openAddSectionModal('${type}')">＋ Add Section</button>` : '');
  } else {
    content = `<div class="rest-day">
        <div class="rest-icon">💤</div>
        <div class="rest-title">Rest Day</div>
        <div class="rest-sub">No workout scheduled.<br>Tap a day above to review.</div>
      </div>`;
  }

  const streak = getStreak();
  const streakBadge = streak > 0 ? `<span class="streak-badge">🔥 ${streak}</span>` : '';

  document.getElementById('app').innerHTML = `
    <div class="app-header">
      <div class="app-title-row">
        <div class="app-title">🏋🏽 Workout Log | 2026 ${streakBadge}</div>
        <div class="header-actions">
          <button class="icon-btn" onclick="openSettings()" title="Schedule">⚙︎</button>
          ${editBtn}
        </div>
      </div>
      <div class="week-tabs">${renderWeekTabs()}</div>
      ${renderStatsCard()}
      ${headerMeta}
    </div>
    ${renderTrainerNote()}
    ${content}
    <div class="app-footer">
      <button class="reset-btn" onclick="confirmReset()">↻&nbsp; START NEW WEEK</button>
    </div>
    ${renderModal()}
  `;
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

loadState();
currentDate = getDefaultDate();
render();
</script>
</body>
</html>
